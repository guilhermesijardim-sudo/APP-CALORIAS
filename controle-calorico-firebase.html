<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calorias">
<meta name="theme-color" content="#0a0a0f">
<title>Controle Calórico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0f;color:#f0ede8;font-family:'DM Mono',monospace;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
:root{--acc:#c8a96e;--acc-bg:#c8a96e15;--acc-br:#c8a96e44}
body.jessica{--acc:#5b9cf6;--acc-bg:#5b9cf615;--acc-br:#5b9cf644}

/* ── LOGIN SCREEN ── */
#login-screen{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:200}
.login-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--acc);margin-bottom:6px;text-align:center}
.login-sub{font-size:11px;color:#444;margin-bottom:36px;text-align:center;letter-spacing:.05em}
.login-card{background:#111120;border:1px solid #1c1c2e;border-radius:14px;padding:24px;width:100%;max-width:340px}
.login-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--acc);margin-bottom:18px;text-align:center}
.login-tabs{display:flex;gap:0;margin-bottom:20px;background:#0d0d1a;border-radius:8px;padding:3px}
.ltab{flex:1;background:none;border:none;padding:8px;font-family:'DM Mono',monospace;font-size:11px;color:#444;cursor:pointer;border-radius:6px;transition:all .2s}
.ltab.active{background:#1c1c2e;color:var(--acc)}
.finp{background:#0d0d1a;border:1px solid #22223a;border-radius:8px;padding:11px 13px;color:#f0ede8;width:100%;font-size:13px;font-family:'DM Mono',monospace;outline:none;transition:border .2s;margin-bottom:10px}
.finp:focus{border-color:var(--acc)}
.finp::placeholder{color:#2e2e44}
.fbta{background:var(--acc);color:#06060f;border:none;border-radius:9px;padding:13px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;width:100%;cursor:pointer;transition:all .2s;letter-spacing:.03em;margin-top:4px}
.fbta:active{filter:brightness(.9)}
.ferr{font-size:11px;color:#f87171;text-align:center;min-height:16px;margin-bottom:8px}
.flink{background:none;border:none;color:#444;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;text-align:center;width:100%;margin-top:12px;line-height:1.6}

/* ── LOADING OVERLAY ── */
#loading{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.load-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--acc);margin-bottom:8px}
.load-sub{font-size:11px;color:#444}
@keyframes spin{to{transform:rotate(360deg)}}
.lspn{width:24px;height:24px;border:2px solid #1e1e30;border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}

/* ── PROFILE BAR ── */
.profile-bar{display:flex;background:#0d0d15;border-bottom:1px solid #18182a;flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.pbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 8px;cursor:pointer;border:none;background:none;color:#444;font-family:'DM Mono',monospace;font-size:11px;border-bottom:2px solid transparent;transition:all .25s}
.pbtn .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#161624;border:2px solid #22223a;transition:all .25s;flex-shrink:0}
.pbtn.au1{color:#c8a96e;border-bottom-color:#c8a96e}
.pbtn.au1 .av{background:#c8a96e20;border-color:#c8a96e;color:#c8a96e}
.pbtn.au2{color:#5b9cf6;border-bottom-color:#5b9cf6}
.pbtn.au2 .av{background:#5b9cf620;border-color:#5b9cf6;color:#5b9cf6}

/* ── HEADER ── */
.header{background:#0d0d15;border-bottom:1px solid #18182a;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.htitle{font-family:'Playfair Display',serif;font-size:18px;color:var(--acc);letter-spacing:.02em;transition:color .3s}
.hsub{font-size:10px;color:#444;margin-top:2px}
.hright{text-align:right;font-size:10px;color:#444}
.logout-btn{background:none;border:1px solid #1c1c2e;border-radius:6px;color:#444;font-family:'DM Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:#444;color:#f0ede8}

/* ── NAV ── */
.nav{display:flex;background:#0d0d15;border-bottom:1px solid #18182a;flex-shrink:0}
.nbtn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#444;padding:10px 4px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nbtn.active{color:var(--acc);border-bottom-color:var(--acc)}

.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}

.card{background:#111120;border:1px solid #1c1c2e;border-radius:12px;padding:16px;margin-bottom:12px}
.ctitle{font-family:'Playfair Display',serif;font-size:14px;color:var(--acc);margin-bottom:12px;transition:color .3s}
.rw{position:relative;width:150px;height:150px;margin:0 auto 12px}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rn{font-family:'Playfair Display',serif;font-size:30px;line-height:1}
.rl{font-size:9px;color:#444;margin-top:2px}
.sr{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid #1c1c2e}
.sv{font-size:15px}.sl{font-size:9px;color:#444;margin-top:2px;text-align:center}
.rfh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rfn{font-family:'Playfair Display',serif;font-size:13px;color:var(--acc)}
.rfc{font-size:11px;color:#555}
.ir{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #161626}
.ir:last-child{border-bottom:none}
.in{font-size:12px;line-height:1.3;max-width:195px}
.ib{font-size:10px;color:#383848;margin-top:1px}
.iright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ical{font-size:12px;color:var(--acc)}
.rmb{background:none;border:none;color:#2e2e44;cursor:pointer;font-size:16px;padding:2px 6px;line-height:1;transition:color .15s}
.rmb:active{color:#f87171}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:#161624;border:1px solid #22223a;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tag.sel{background:var(--acc-bg);border-color:var(--acc-br);color:var(--acc)}
.inp{background:#0d0d1a;border:1px solid #22223a;border-radius:8px;padding:10px 13px;color:#f0ede8;width:100%;font-size:13px;font-family:'DM Mono',monospace;outline:none;transition:border .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:#2e2e44}
.bta{background:var(--acc);color:#06060f;border:none;border-radius:9px;padding:12px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;width:100%;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.bta:active{filter:brightness(.9)}
.btl{background:none;border:none;color:var(--acc);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;padding:0}
.sres{margin-top:10px;max-height:255px;overflow-y:auto}
.fi{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:#141422;border:1px solid #1c1c2e;border-radius:8px;cursor:pointer;margin-bottom:5px;transition:background .15s;gap:10px}
.fi:active{background:#1c1c2e}
.fin{flex:1;min-width:0}
.fin-n{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fin-b{font-size:10px;color:#383848;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fic{font-size:12px;color:var(--acc);flex-shrink:0}
.lding{text-align:center;padding:20px;color:#333;font-size:12px}
.spn{width:18px;height:18px;border:2px solid #1e1e30;border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
.cform{margin-top:12px;padding-top:12px;border-top:1px solid #1c1c2e}
.r2{display:flex;gap:8px}
.hbw{height:6px;background:#161626;border-radius:3px;overflow:hidden;margin-top:5px}
.hb{height:100%;border-radius:3px;transition:width .7s ease}
.hrow{margin-bottom:16px}
.hh{display:flex;justify-content:space-between;font-size:11px}
.inr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #161626;font-size:12px}
.inr:last-child{border-bottom:none}
.inl{color:#444}
.tip{margin-top:12px;padding:11px;background:#0d0d1a;border-left:2px solid var(--acc);border-radius:0 8px 8px 0;font-size:10px;color:#444;line-height:1.7}
.empty{text-align:center;padding:36px 20px;color:#333}
.ei{font-size:36px;margin-bottom:10px}
.et{font-size:12px;margin-bottom:16px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--acc);color:#06060f;padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.moverlay{position:fixed;inset:0;background:#000d;display:flex;align-items:flex-end;z-index:100}
.modal{background:#111120;border:1px solid #1c1c2e;border-top:1px solid var(--acc-br);border-radius:16px 16px 0 0;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));width:100%;max-height:65vh;overflow-y:auto}
.mt{font-family:'Playfair Display',serif;font-size:15px;color:var(--acc);margin-bottom:4px}
.ms{font-size:11px;color:#383848;margin-bottom:14px}
@keyframes mIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{animation:mIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:sIn .22s ease}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.syncing{background:#facc15;animation:pulse 1s infinite}
.sync-dot.offline{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="lspn"></div>
  <div class="load-title">Controle Calórico</div>
  <div class="load-sub">Conectando...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-logo">Controle Calórico</div>
  <div class="login-sub">POWERED BY FIREBASE ☁️</div>
  <div class="login-card">
    <div class="login-title" id="login-title">Entrar</div>
    <div class="login-tabs">
      <button class="ltab active" onclick="setLoginTab('login')">Entrar</button>
      <button class="ltab" onclick="setLoginTab('register')">Criar conta</button>
    </div>
    <div class="ferr" id="ferr"></div>
    <input class="finp" id="f-email" type="email" placeholder="E-mail" autocomplete="email">
    <input class="finp" id="f-pass" type="password" placeholder="Senha" autocomplete="current-password">
    <div id="f-name-wrap" style="display:none">
      <input class="finp" id="f-name" type="text" placeholder="Seu nome" autocomplete="name">
    </div>
    <button class="fbta" id="f-btn" onclick="doAuth()">Entrar</button>
    <button class="flink" onclick="doReset()">Esqueci a senha</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="profile-bar" id="pbar"></div>
  <div class="header">
    <div>
      <div class="htitle" id="htitle">Controle Calórico</div>
      <div class="hsub" id="hsub"></div>
    </div>
    <div class="hright" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="hdate"></div>
      <div style="display:flex;align-items:center;gap:4px">
        <span id="sync-status" class="sync-dot" title="Sincronizado"></span>
        <button class="logout-btn" onclick="doLogout()">Sair</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nbtn active" onclick="setAba('hoje')">Hoje</button>
    <button class="nbtn" onclick="setAba('add')">+ Adicionar</button>
    <button class="nbtn" onclick="setAba('hist')">Histórico</button>
    <button class="nbtn" onclick="setAba('perfil')">Perfil</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ── FIREBASE CONFIG ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCCmROrCWOGahUI4cbniTy22iu_i0EGbsE",
  authDomain: "app-calorias-e63f8.firebaseapp.com",
  projectId: "app-calorias-e63f8",
  storageBucket: "app-calorias-e63f8.firebasestorage.app",
  messagingSenderId: "267012340278",
  appId: "1:267012340278:web:abb05ec42a58f2e302f697"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ── PERFIS FIXOS (dados físicos) ─────────────────────────
// Cada usuário tem seu perfil vinculado ao email
const PERFIS_EMAIL = {
  'guilhermesijardim@gmail.com': {nome:'Você',ini:'EU',peso:100,alt:177,idade:25,sexo:'M',tmb:2100,meta:1600,cor:'#c8a96e',theme:'gold'},
};
const JESSICA_EMAILS = []; // adicionar email da Jessica quando ela criar conta
const PERFIL_DEFAULT = {nome:'Usuário',ini:'US',peso:70,alt:170,idade:25,sexo:'M',tmb:1800,meta:1400,cor:'#c8a96e',theme:'gold'};

// Detecta perfil pelo email
function getPerfil(email){
  if(!email) return PERFIL_DEFAULT;
  const k=Object.keys(PERFIS_EMAIL).find(e=>e.toLowerCase()===email.toLowerCase());
  return k?PERFIS_EMAIL[k]:PERFIL_DEFAULT;
}
function isJessica(email){
  return email&&email.toLowerCase().includes('jessica');
}

// ── STATE ────────────────────────────────────────────────
let currentUser = null;
let perfil = null;
let aba = 'hoje';
let refSel = 'Almoço';
let stimer = null;
let pFood = null;
let histPage = 0;
let cachedDays = {}; // cache local dos dias
const HIST_PAGE = 14;
const REFS = ['Café da manhã','Lanche manhã','Almoço','Lanche tarde','Jantar','Ceia'];

// ── FIRESTORE HELPERS ────────────────────────────────────
function hoje(){ return new Date().toISOString().split('T')[0]; }

function setSyncStatus(s){
  const d=document.getElementById('sync-status');
  if(!d)return;
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='offline'?' offline':'');
  d.title=s==='ok'?'Sincronizado':s==='syncing'?'Salvando...':'Sem conexão';
}

async function saveDay(uid, date, items){
  setSyncStatus('syncing');
  try{
    await setDoc(doc(db,'users',uid,'dias',date),{items,updatedAt:Date.now()});
    cachedDays[date]=items;
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('offline');
    // Salva no localStorage como fallback
    const fb=JSON.parse(localStorage.getItem('cc_fb_'+uid)||'{}');
    fb[date]=items;
    localStorage.setItem('cc_fb_'+uid,JSON.stringify(fb));
    toast('⚠️ Salvo localmente (sem conexão)');
  }
}

async function loadAllDays(uid){
  try{
    const snap=await getDocs(collection(db,'users',uid,'dias'));
    const days={};
    snap.forEach(d=>{ days[d.id]=d.data().items||[]; });
    cachedDays=days;
    // Merge com localStorage fallback
    const fb=JSON.parse(localStorage.getItem('cc_fb_'+uid)||'{}');
    Object.keys(fb).forEach(d=>{ if(!days[d]) days[d]=fb[d]; });
    cachedDays=days;
    return days;
  }catch(e){
    // Offline: usa cache local
    const fb=JSON.parse(localStorage.getItem('cc_fb_'+uid)||'{}');
    cachedDays=fb;
    setSyncStatus('offline');
    return fb;
  }
}

function getDia(date){ return cachedDays[date]||[]; }

async function addItem(item){
  const d=hoje();
  const items=[...getDia(d),item];
  cachedDays[d]=items;
  render(); // atualiza UI imediatamente
  await saveDay(currentUser.uid,d,items);
}

async function removeItem(date,id){
  const items=(cachedDays[date]||[]).filter(x=>x.id!==id);
  cachedDays[date]=items;
  render();
  await saveDay(currentUser.uid,date,items);
}

// ── AUTH ─────────────────────────────────────────────────
let loginTab='login';
function setLoginTab(t){
  loginTab=t;
  document.querySelectorAll('.ltab').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===t));
  document.getElementById('login-title').textContent=t==='login'?'Entrar':'Criar conta';
  document.getElementById('f-btn').textContent=t==='login'?'Entrar':'Criar conta';
  document.getElementById('f-name-wrap').style.display=t==='register'?'block':'none';
  document.getElementById('ferr').textContent='';
}
window.setLoginTab=setLoginTab;

async function doAuth(){
  const email=document.getElementById('f-email').value.trim();
  const pass=document.getElementById('f-pass').value;
  const err=document.getElementById('ferr');
  err.textContent='';
  if(!email||!pass){err.textContent='Preencha email e senha';return;}
  document.getElementById('f-btn').textContent='Aguarde...';
  try{
    if(loginTab==='login'){
      await signInWithEmailAndPassword(auth,email,pass);
    } else {
      await createUserWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    const msgs={'auth/invalid-email':'Email inválido','auth/wrong-password':'Senha incorreta','auth/user-not-found':'Usuário não encontrado','auth/email-already-in-use':'Email já cadastrado','auth/weak-password':'Senha fraca (mínimo 6 caracteres)'};
    err.textContent=msgs[e.code]||'Erro: '+e.message;
    document.getElementById('f-btn').textContent=loginTab==='login'?'Entrar':'Criar conta';
  }
}
window.doAuth=doAuth;

async function doReset(){
  const email=document.getElementById('f-email').value.trim();
  if(!email){document.getElementById('ferr').textContent='Digite seu email primeiro';return;}
  try{
    await sendPasswordResetEmail(auth,email);
    document.getElementById('ferr').style.color='#4ade80';
    document.getElementById('ferr').textContent='Email de recuperação enviado!';
  }catch(e){document.getElementById('ferr').textContent='Erro ao enviar email';}
}
window.doReset=doReset;

async function doLogout(){
  await signOut(auth);
}
window.doLogout=doLogout;

// ── AUTH STATE ───────────────────────────────────────────
onAuthStateChanged(auth, async(user)=>{
  document.getElementById('loading').style.display='none';
  if(user){
    currentUser=user;
    perfil=getPerfil(user.email);
    // Detecta Jessica pelo email
    if(isJessica(user.email)){
      perfil={...perfil,nome:'Jessica',ini:'JE',peso:91,alt:165,idade:30,sexo:'F',tmb:1630,meta:1380,cor:'#5b9cf6',theme:'blue'};
    }
    document.body.classList.toggle('jessica',perfil.theme==='blue');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    updHeader();
    // Carrega dados
    showLoading('Carregando seus dados...');
    await loadAllDays(user.uid);
    hideLoading();
    render();
  } else {
    currentUser=null;
    cachedDays={};
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
});

function showLoading(msg){
  const l=document.getElementById('loading');
  l.querySelector('.load-sub').textContent=msg||'Carregando...';
  l.style.display='flex';
}
function hideLoading(){ document.getElementById('loading').style.display='none'; }

// ── HEADER ───────────────────────────────────────────────
function updHeader(){
  if(!perfil)return;
  document.getElementById('htitle').textContent=perfil.nome;
  document.getElementById('hsub').textContent='Meta: '+perfil.meta+' kcal/dia';
}

// ── NAV ──────────────────────────────────────────────────
function setAba(a){
  aba=a;
  if(a==='hist') histPage=0;
  document.querySelectorAll('.nbtn').forEach((b,i)=>b.classList.toggle('active',['hoje','add','hist','perfil'][i]===a));
  render();
}
window.setAba=setAba;

// ── TOAST ────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
window.toast=toast;

// ── RENDER ───────────────────────────────────────────────
function render(){
  if(!currentUser||!perfil)return;
  const c=document.getElementById('content');c.innerHTML='';
  const w=document.createElement('div');w.className='slide';
  if(aba==='hoje')rHoje(w);
  else if(aba==='add')rAdd(w);
  else if(aba==='hist')rHist(w);
  else rPerfil(w);
  c.appendChild(w);
}

// ── HOJE ─────────────────────────────────────────────────
function rHoje(w){
  const d=hoje();
  const items=getDia(d);
  const total=items.reduce((s,x)=>s+x.cal,0);
  const pct=Math.min(total/perfil.meta*100,100);
  const rest=perfil.meta-total;
  const cor=pct<70?'#4ade80':pct<90?'#facc15':pct<100?'#fb923c':'#f87171';
  const C=2*Math.PI*62;
  w.innerHTML+=`<div class="card">
    <div class="rw"><svg width="150" height="150" style="transform:rotate(-90deg)">
      <circle cx="75" cy="75" r="62" fill="none" stroke="#161626" stroke-width="9"/>
      <circle cx="75" cy="75" r="62" fill="none" stroke="${cor}" stroke-width="9"
        stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"
        stroke-linecap="round" style="transition:stroke-dashoffset .6s,stroke .4s"/>
    </svg>
    <div class="rc"><div class="rn" style="color:${cor}">${total}</div><div class="rl">kcal hoje</div></div></div>
    <div style="text-align:center;font-size:11px;color:${rest>=0?'#6ee7b7':'#f87171'}">
      ${rest>=0?`Pode comer mais <b>${rest}</b> kcal`:`Ultrapassado em <b>${Math.abs(rest)}</b> kcal`}
    </div>
    <div class="sr">
      <div><div class="sv">${perfil.meta}</div><div class="sl">Meta</div></div>
      <div><div class="sv">${total}</div><div class="sl">Consumido</div></div>
      <div><div class="sv" style="color:${cor}">${rest>0?rest:0}</div><div class="sl">Restante</div></div>
    </div>
  </div>`;
  if(!items.length){
    w.innerHTML+=`<div class="empty"><div class="ei">🥗</div><div class="et">Nenhum alimento hoje</div>
      <button class="bta" style="width:auto;padding:10px 24px" onclick="setAba('add')">+ Adicionar alimento</button></div>`;
  } else {
    REFS.forEach(ref=>{
      const ri=items.filter(x=>x.refeicao===ref);if(!ri.length)return;
      const sub=ri.reduce((s,x)=>s+x.cal,0);
      w.innerHTML+=`<div class="card"><div class="rfh"><span class="rfn">${ref}</span><span class="rfc">${sub} kcal</span></div>
        ${ri.map(x=>`<div class="ir">
          <div><div class="in">${x.nome}</div>${x.marca||x.qtd?`<div class="ib">${[x.marca,x.qtd].filter(Boolean).join(' · ')}</div>`:''}</div>
          <div class="iright"><span class="ical">${x.cal} kcal</span>
          <button class="rmb" onclick="rmItem('${d}',${x.id})">×</button></div>
        </div>`).join('')}
      </div>`;
    });
    w.innerHTML+=`<button class="bta" onclick="setAba('add')">+ Adicionar mais</button>`;
  }
}
window.rmItem=async(d,id)=>{ await removeItem(d,id); };

// ── ADICIONAR ────────────────────────────────────────────
function rAdd(w){
  w.innerHTML=`
  <div class="card"><div class="ctitle">Qual refeição?</div>
    <div class="tags" id="tref">${REFS.map(r=>`<span class="tag${r===refSel?' sel':''}" onclick="selR('${r}')">${r}</span>`).join('')}</div>
  </div>
  <div class="card"><div class="ctitle">Buscar alimento</div>
    <input class="inp" id="sinp" placeholder="Nome, marca ou código de barras..." oninput="onSrch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="sres" class="sres"></div>
  </div>
  <div class="card">
    <button class="btl" onclick="togCustom()">▸ Adicionar manualmente</button>
    <div class="cform" id="cform" style="display:none">
      <input class="inp" id="cn" placeholder="Nome do alimento" style="margin-bottom:8px" autocomplete="off">
      <div class="r2" style="margin-bottom:8px">
        <input class="inp" id="cc" placeholder="Kcal" type="number" inputmode="decimal">
        <input class="inp" id="cq" placeholder="Qtd (ex: 150g)" autocomplete="off">
      </div>
      <button class="bta" onclick="addCustom()">Adicionar</button>
    </div>
  </div>`;
  showPop();
}
window.selR=(r)=>{refSel=r;document.querySelectorAll('#tref .tag').forEach(t=>t.classList.toggle('sel',t.textContent===r));};
window.togCustom=()=>{const f=document.getElementById('cform');const b=f.previousElementSibling;const show=f.style.display==='none';f.style.display=show?'block':'none';b.textContent=show?'▾ Adicionar manualmente':'▸ Adicionar manualmente';};
window.addCustom=async()=>{
  const n=document.getElementById('cn').value.trim();
  const c=parseInt(document.getElementById('cc').value);
  const q=document.getElementById('cq').value.trim();
  if(!n||!c){toast('Preencha nome e kcal');return;}
  await addItem({id:Date.now(),nome:n,marca:'',cal:c,qtd:q,refeicao:refSel,hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
  toast('✓ Adicionado!');setAba('hoje');
};

// ── POPULARES ────────────────────────────────────────────
const POP=[
  {nome:'Arroz branco cozido',marca:'',c:128},{nome:'Feijão cozido',marca:'',c:76},
  {nome:'Frango grelhado',marca:'',c:165},{nome:'Carne bovina (patinho)',marca:'',c:163},
  {nome:'Ovo cozido',marca:'',c:155},{nome:'Pão francês',marca:'',c:274},
  {nome:'Pão de forma',marca:'Wickbold',c:267},{nome:'Margarina',marca:'Qualy',c:545},
  {nome:'Leite integral',marca:'',c:61},{nome:'Iogurte natural',marca:'Nestlé',c:61},
  {nome:'Banana',marca:'',c:89},{nome:'Maçã',marca:'',c:52},
  {nome:'Batata cozida',marca:'',c:87},{nome:'Macarrão cozido',marca:'',c:131},
  {nome:'Queijo minas frescal',marca:'',c:264},{nome:'Aveia em flocos',marca:'Quaker',c:369},
  {nome:'Biscoito cream cracker',marca:'Club Social',c:441},
  {nome:'Refrigerante cola',marca:'Coca-Cola',c:40},
  {nome:'Suco de laranja natural',marca:'',c:45},
  {nome:'Café sem açúcar',marca:'',c:2},
];
function showPop(){const r=document.getElementById('sres');if(!r)return;r.innerHTML=`<div style="font-size:10px;color:#2e2e44;margin-bottom:8px;letter-spacing:.05em">POPULARES</div>`+POP.slice(0,8).map(a=>fiHTML({nome:a.nome,marca:a.marca,cal100:a.c})).join('');}
function fiHTML(a){const n=a.nome||(a.product_name_pt||a.product_name||'Produto');const m=a.marca||(a.brands||'');const c=a.cal100||(a.nutriments?Math.round(a.nutriments['energy-kcal_100g']||0):0);return `<div class="fi" onclick="openQtd('${esc(n)}','${esc(m)}',${c})"><div class="fin"><div class="fin-n">${n}</div>${m?`<div class="fin-b">${m}</div>`:''}</div><div class="fic">${c} kcal/100g</div></div>`;}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

window.onSrch=async(v)=>{
  clearTimeout(stimer);const r=document.getElementById('sres');if(!r)return;
  if(v.length<2){showPop();return;}
  const loc=POP.filter(a=>a.nome.toLowerCase().includes(v.toLowerCase())||(a.marca&&a.marca.toLowerCase().includes(v.toLowerCase())));
  if(v.length<3){r.innerHTML=loc.map(a=>fiHTML({nome:a.nome,marca:a.marca,cal100:a.c})).join('');return;}
  r.innerHTML=`<div class="lding"><div class="spn"></div>Buscando...</div>`;
  stimer=setTimeout(async()=>{
    try{
      const isBC=/^\d{8,14}$/.test(v.replace(/\s/g,''));
      const url=isBC?`https://world.openfoodfacts.org/api/v0/product/${v.replace(/\s/g,'')}.json`:`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(v)}&search_simple=1&action=process&json=1&lc=pt&cc=br&fields=code,product_name,product_name_pt,brands,nutriments&page_size=15`;
      const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
      const data=await res.json();
      let prods=[];
      if(isBC){if(data.status===1&&data.product)prods=[data.product];}
      else prods=(data.products||[]).filter(p=>{const k=p.nutriments&&p.nutriments['energy-kcal_100g'];return k&&k>0&&(p.product_name_pt||p.product_name);});
      const lH=loc.length?`<div style="font-size:10px;color:#2e2e44;margin-bottom:8px">LOCAL</div>`+loc.map(a=>fiHTML({nome:a.nome,marca:a.marca,cal100:a.c})).join(''):'';
      const oH=prods.length?`<div style="font-size:10px;color:#2e2e44;margin:${loc.length?8:0}px 0 8px">OPEN FOOD FACTS</div>`+prods.map(p=>fiHTML(p)).join(''):'';
      r.innerHTML=(lH+oH)||`<div class="lding">Nenhum resultado. Adicione manualmente.</div>`;
    }catch{
      const l2=POP.filter(a=>a.nome.toLowerCase().includes(v.toLowerCase()));
      r.innerHTML=l2.length?l2.map(a=>fiHTML({nome:a.nome,marca:a.marca,cal100:a.c})).join(''):`<div class="lding">Sem conexão. Adicione manualmente.</div>`;
    }
  },500);
};

window.openQtd=(n,m,c100)=>{
  pFood={n,m,c100};
  const ov=document.createElement('div');ov.className='moverlay';ov.id='qov';
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  ov.innerHTML=`<div class="modal"><div class="mt">${n}</div><div class="ms">${m?m+' · ':''}${c100} kcal/100g</div>
    <label style="font-size:11px;color:#444;display:block;margin-bottom:6px">Quantidade em gramas ou ml</label>
    <input class="inp" id="qinp" type="number" inputmode="decimal" placeholder="Ex: 150">
    <div id="qprev" style="font-size:14px;text-align:center;min-height:26px;margin:10px 0;color:var(--acc)"></div>
    <button class="bta" onclick="confQtd()">Adicionar</button>
    <button onclick="closeModal()" style="background:none;border:none;color:#333;font-family:'DM Mono',monospace;font-size:11px;width:100%;padding:10px;cursor:pointer;margin-top:4px">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('qinp').focus(),150);
  document.getElementById('qinp').addEventListener('input',function(){const q=parseFloat(this.value);document.getElementById('qprev').textContent=q>0?`≈ ${Math.round(c100*q/100)} kcal`:'';});
};
window.closeModal=()=>{const o=document.getElementById('qov');if(o)o.remove();pFood=null;};
window.confQtd=async()=>{
  const q=parseFloat(document.getElementById('qinp').value);
  if(!q||q<=0){toast('Informe a quantidade');return;}
  const cal=Math.round(pFood.c100*q/100);
  await addItem({id:Date.now(),nome:pFood.n,marca:pFood.m,cal,qtd:q+'g',refeicao:refSel,hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
  closeModal();toast(`✓ +${cal} kcal!`);setAba('hoje');
};

// ── HISTÓRICO ────────────────────────────────────────────
function rHist(w){
  const allKeys=Object.keys(cachedDays).sort().reverse();
  const totalDias=allKeys.length;
  const start=histPage*HIST_PAGE;
  const pageKeys=allKeys.slice(start,start+HIST_PAGE);
  const hasPrev=histPage>0;
  const hasNext=start+HIST_PAGE<totalDias;
  const totalCal=allKeys.reduce((s,d)=>s+(cachedDays[d]||[]).reduce((ss,x)=>ss+x.cal,0),0);
  const media=totalDias?Math.round(totalCal/totalDias):0;
  const ok=allKeys.filter(d=>{const t=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);return t>0&&t<=perfil.meta*1.1;});
  const rows=!pageKeys.length?`<div style="color:#2e2e44;font-size:12px">Sem registros ainda</div>`
    :pageKeys.map(d=>{
      const dt=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);
      const pct=Math.min(dt/perfil.meta*100,100);
      const cor=pct<90?'#4ade80':pct<105?'#facc15':'#f87171';
      const dateObj=new Date(d+'T12:00');
      const lbl=d===hoje()?'Hoje':dateObj.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:dateObj.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
      const items=cachedDays[d]||[];
      const detalhes=items.map(x=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:10px;color:#444;border-bottom:1px solid #161626"><span style="max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.nome}${x.qtd?' ('+x.qtd+')':''}</span><span style="color:var(--acc);flex-shrink:0;margin-left:8px">${x.cal} kcal</span></div>`).join('');
      return `<div class="hrow"><div class="hh" style="cursor:pointer" onclick="togDetail('dd_${d}')">
        <span style="color:${d===hoje()?'var(--acc)':'#666'}">${lbl}</span>
        <span style="color:${cor};display:flex;align-items:center;gap:6px">${dt} / ${perfil.meta} <span style="font-size:9px;color:#333" id="arr_${d}">▸</span></span>
      </div><div class="hbw" style="margin-top:5px"><div class="hb" style="width:${pct}%;background:${cor}"></div></div>
      <div id="dd_${d}" style="display:none;margin-top:8px">${detalhes||'<div style="font-size:10px;color:#333;padding:4px 0">Sem detalhes</div>'}</div></div>`;
    }).join('');
  const firstDate=pageKeys.length?new Date(pageKeys[pageKeys.length-1]+'T12:00'):null;
  const lastDate=pageKeys.length?new Date(pageKeys[0]+'T12:00'):null;
  const periodLabel=firstDate&&lastDate?(firstDate.getMonth()===lastDate.getMonth()&&firstDate.getFullYear()===lastDate.getFullYear()?firstDate.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):firstDate.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})+' – '+lastDate.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})):'';
  w.innerHTML=`
  <div class="card" style="padding:0;overflow:hidden;display:flex">
    ${[['Total','de dias',totalDias],['Dentro','da meta',ok.length],['Média','kcal/dia',media]].map(([a,b,v],i)=>`
    <div style="flex:1;text-align:center;padding:14px 8px;${i<2?'border-right:1px solid #1c1c2e':''}">
      <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--acc)">${v}</div>
      <div style="font-size:9px;color:#333;margin-top:3px;line-height:1.5">${a}<br>${b}</div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="ctitle" style="margin-bottom:0">Registros${periodLabel?' · '+periodLabel:''}</div>
      <div style="font-size:10px;color:#333">${totalDias?start+1+'-'+Math.min(start+HIST_PAGE,totalDias)+' / '+totalDias:'0'}</div>
    </div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="histNav(-1)" style="flex:1;background:${hasPrev?'#161626':'#111120'};border:1px solid ${hasPrev?'#2a2a40':'#1c1c2e'};border-radius:8px;padding:10px;color:${hasPrev?'#f0ede8':'#2e2e44'};font-family:'DM Mono',monospace;font-size:11px;cursor:${hasPrev?'pointer':'default'}">← Recentes</button>
      <button onclick="histNav(1)" style="flex:1;background:${hasNext?'#161626':'#111120'};border:1px solid ${hasNext?'#2a2a40':'#1c1c2e'};border-radius:8px;padding:10px;color:${hasNext?'#f0ede8':'#2e2e44'};font-family:'DM Mono',monospace;font-size:11px;cursor:${hasNext?'pointer':'default'}">Antigos →</button>
    </div>
  </div>`;
}
window.togDetail=(id)=>{const el=document.getElementById(id);if(!el)return;const open=el.style.display!=='none';el.style.display=open?'none':'block';const day=id.replace('dd_','');const arr=document.getElementById('arr_'+day);if(arr)arr.textContent=open?'▸':'▾';};
window.histNav=(dir)=>{const total=Object.keys(cachedDays).length;const np=histPage+dir;if(np<0||np*HIST_PAGE>=total)return;histPage=np;render();};

// ── PERFIL ───────────────────────────────────────────────
function rPerfil(w){
  const p=perfil;
  const imc=(p.peso/Math.pow(p.alt/100,2)).toFixed(1);
  const cls=imc<25?'Peso normal':imc<30?'Sobrepeso':imc<35?'Obesidade grau I':'Obesidade grau II';
  const def=Math.round(p.tmb*1.2-p.meta);
  const kgSem=(def/7700*7).toFixed(2);
  const alvo=Math.round(p.peso*0.85);
  const sems=Math.round((p.peso-alvo)/parseFloat(kgSem));
  w.innerHTML=`
  <div class="card" style="text-align:center;padding:20px">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--acc-bg);border:2px solid var(--acc-br);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:'Playfair Display',serif;font-size:22px;color:var(--acc)">${p.ini}</div>
    <div style="font-family:'Playfair Display',serif;font-size:18px">${p.nome}</div>
    <div style="font-size:10px;color:#333;margin-top:4px">${p.idade} anos · ${p.sexo==='M'?'Masculino':'Feminino'} · Sedentário</div>
    <div style="font-size:10px;color:#333;margin-top:2px">${currentUser?.email}</div>
  </div>
  <div class="card"><div class="ctitle">Dados físicos</div>
    ${[['Peso',p.peso+' kg'],['Altura',p.alt+' cm'],['IMC',imc+' · '+cls],['TMB estimada','~'+Math.round(p.tmb*1.2)+' kcal/dia']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span>${v}</span></div>`).join('')}
  </div>
  <div class="card"><div class="ctitle">Plano alimentar</div>
    ${[['Meta diária',p.meta+' kcal'],['Déficit',def+' kcal/dia'],['Perda estimada','~'+kgSem+' kg/semana'],['Peso alvo','~'+alvo+' kg (−15%)'],['Prazo estimado','~'+sems+' semanas']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span>${v}</span></div>`).join('')}
    <div class="tip">💡 Seus dados ficam salvos na nuvem. Acesse de qualquer dispositivo com seu login.</div>
  </div>`;
}
</script>
