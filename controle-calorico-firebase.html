<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calorias">
<meta name="theme-color" content="#e8f0fe">
<title>Controle Calórico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#dde8f5;color:#1a2a3a;font-family:Arial,Helvetica,sans-serif;overflow:hidden;font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#c8d8ea}::-webkit-scrollbar-thumb{background:#8aaac8;border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* THEME */
:root{
  --acc:#1a6fb5;--acc-bg:#1a6fb520;--acc-br:#1a6fb560;
  --bg:#dde8f5;--bg2:#eaf2fb;--bg3:#d0e0f0;
  --border:#b0c8e0;--text:#1a2a3a;--text2:#3a5570;--text3:#6a8aaa;
  --card:#eaf2fb;--nav:#d5e5f5;--header:#c8daf0;
}
body.jessica{--acc:#1a7ab5;--acc-bg:#1a7ab520;--acc-br:#1a7ab560}

/* LOADING */
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.load-title{font-size:26px;font-weight:700;color:var(--acc);margin-bottom:6px;text-align:center}
.load-greeting{font-size:18px;font-weight:600;color:var(--text2);margin-bottom:4px;text-align:center}
.load-sub{font-size:13px;color:var(--text3);text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.lspn{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200}
.login-logo{font-size:28px;font-weight:700;color:var(--acc);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center}
.login-card{background:white;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(26,111,181,.1)}
.login-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center}
.login-tabs{display:flex;margin-bottom:18px;background:var(--bg3);border-radius:8px;padding:3px}
.ltab{flex:1;background:none;border:none;padding:9px;font-size:14px;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .2s}
.ltab.active{background:white;color:var(--acc);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.finp{background:#f5f8fc;border:1.5px solid var(--border);border-radius:8px;padding:13px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s;margin-bottom:10px}
.finp:focus{border-color:var(--acc)}
.finp::placeholder{color:var(--text3)}
.fbta{background:var(--acc);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s;margin-top:4px}
.fbta:active{filter:brightness(.9)}
.ferr{font-size:13px;color:#e05050;text-align:center;min-height:18px;margin-bottom:8px}
.flink{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-align:center;width:100%;margin-top:12px}

/* ONBOARDING */
#onboard-screen{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:150;overflow-y:auto}
.onboard-card{background:white;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(26,111,181,.1)}
.onboard-title{font-size:20px;font-weight:700;color:var(--acc);margin-bottom:6px;text-align:center}
.onboard-sub{font-size:13px;color:var(--text3);margin-bottom:20px;text-align:center}
.onboard-step{font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px;font-weight:600;letter-spacing:.05em}

/* APP */
.profile-bar{display:flex;background:var(--header);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.pbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:13px;border-bottom:2px solid transparent;transition:all .25s}
.pbtn .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg3);border:2px solid var(--border);transition:all .25s;flex-shrink:0}
.pbtn.au1{color:#b07010;border-bottom-color:#c8901a}
.pbtn.au1 .av{background:#c8901a20;border-color:#c8901a;color:#b07010}
.pbtn.au2{color:#1a6fb5;border-bottom-color:#1a6fb5}
.pbtn.au2 .av{background:#1a6fb520;border-color:#1a6fb5;color:#1a6fb5}

.header{background:var(--header);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.htitle{font-size:19px;font-weight:700;color:var(--acc)}
.hsub{font-size:12px;color:var(--text3);margin-top:2px}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--text3);font-size:12px;padding:5px 10px;cursor:pointer;transition:all .2s}
.logout-btn:active{background:var(--bg3)}

.nav{display:flex;background:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0}
.nbtn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:11px 4px;font-size:12px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nbtn.active{color:var(--acc);border-bottom-color:var(--acc)}

.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,111,181,.06)}
.ctitle{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}
.rw{position:relative;width:160px;height:160px;margin:0 auto 12px}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rn{font-size:36px;font-weight:700;line-height:1}
.rl{font-size:12px;color:var(--text3);margin-top:4px}
.sr{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid var(--border)}
.sv{font-size:18px;font-weight:700;text-align:center}
.sl{font-size:12px;color:var(--text3);margin-top:3px;text-align:center}
.rfh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rfn{font-size:15px;font-weight:700;color:var(--acc)}
.rfc{font-size:13px;color:var(--text2)}
.ir{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3)}
.ir:last-child{border-bottom:none}
.in{font-size:14px;line-height:1.4;max-width:185px;color:var(--text)}
.ib{font-size:12px;color:var(--text3);margin-top:2px}
.iright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ical{font-size:14px;font-weight:700;color:var(--acc)}
.iedit{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 5px}
.rmb{background:none;border:none;color:#cc4444;cursor:pointer;font-size:18px;padding:3px 5px;line-height:1}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:white;border:1.5px solid var(--border);border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--text2)}
.tag.sel{background:var(--acc-bg);border-color:var(--acc);color:var(--acc);font-weight:700}
.inp{background:white;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--text3)}
select.inp{cursor:pointer}
.bta{background:var(--acc);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s}
.bta:active{filter:brightness(.9)}
.btl{background:none;border:none;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;padding:0}
.sres{margin-top:12px;max-height:260px;overflow-y:auto}
.fi{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:white;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;margin-bottom:6px;transition:all .15s;gap:10px}
.fi:active{background:var(--bg3)}
.fin{flex:1;min-width:0}
.fin-n{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.fin-b{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fic{font-size:13px;font-weight:700;color:var(--acc);flex-shrink:0}
.lding{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.spn{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
.cform{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.r2{display:flex;gap:8px}
.hbw{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px}
.hb{height:100%;border-radius:4px;transition:width .7s ease}
.hrow{margin-bottom:16px}
.hh{display:flex;justify-content:space-between;font-size:13px}
.inr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3);font-size:14px}
.inr:last-child{border-bottom:none}
.inl{color:var(--text2)}
.tip{margin-top:12px;padding:12px;background:var(--acc-bg);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;font-size:13px;color:var(--text2);line-height:1.6}
.empty{text-align:center;padding:40px 20px}
.ei{font-size:42px;margin-bottom:12px}
.et{font-size:15px;margin-bottom:18px;color:var(--text2)}
#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--acc);color:white;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 12px rgba(26,111,181,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.moverlay{position:fixed;inset:0;background:#000a;display:flex;align-items:flex-end;z-index:100}
.modal{background:white;border:1px solid var(--border);border-top:3px solid var(--acc);border-radius:18px 18px 0 0;padding:22px;padding-bottom:max(22px,env(safe-area-inset-bottom));width:100%;max-height:75vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(26,111,181,.15)}
.mt{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.ms{font-size:13px;color:var(--text3);margin-bottom:16px}
@keyframes mIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{animation:mIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:sIn .22s ease}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2ab55a;display:inline-block;margin-left:5px;vertical-align:middle}
.sync-dot.syncing{background:#e8a020;animation:pulse 1s infinite}
.sync-dot.offline{background:#e04040}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.src-badge{font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;color:var(--text3);margin-left:5px;vertical-align:middle}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600}
.version-badge{font-size:10px;color:var(--text3);text-align:center;padding:8px;letter-spacing:.03em}
</style>
</head>
<body>

<div id="loading">
  <div class="lspn"></div>
  <div class="load-greeting" id="load-greeting"></div>
  <div class="load-sub" id="load-msg">Carregando seus dados...</div>
</div>

<div id="login-screen" style="display:none">
  <div class="login-logo">🥗 Controle Calórico</div>
  <div class="login-sub">☁️ Sincronizado com a nuvem</div>
  <div class="login-card">
    <div class="login-title" id="login-title">Entrar</div>
    <div class="login-tabs">
      <button class="ltab active" onclick="setLoginTab('login')">Entrar</button>
      <button class="ltab" onclick="setLoginTab('register')">Criar conta</button>
    </div>
    <div class="ferr" id="ferr"></div>
    <input class="finp" id="f-email" type="email" placeholder="E-mail" autocomplete="email">
    <input class="finp" id="f-pass" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="fbta" id="f-btn" onclick="doAuth()">Entrar</button>
    <button class="flink" onclick="doReset()">Esqueci a senha</button>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboard-screen" style="display:none">
  <div class="onboard-card">
    <div style="text-align:center;font-size:36px;margin-bottom:12px">👋</div>
    <div class="onboard-title">Bem-vindo!</div>
    <div class="onboard-sub">Vamos configurar seu plano calórico personalizado. Leva menos de 1 minuto!</div>
    <div class="onboard-step">DADOS PESSOAIS</div>
    <label>Seu nome</label>
    <input class="inp" id="ob-nome" placeholder="Como prefere ser chamado?" style="margin-bottom:12px">
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Peso (kg)</label><input class="inp" id="ob-peso" type="number" inputmode="decimal" placeholder="Ex: 75"></div>
      <div style="flex:1"><label>Altura (cm)</label><input class="inp" id="ob-alt" type="number" inputmode="decimal" placeholder="Ex: 170"></div>
    </div>
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Idade</label><input class="inp" id="ob-idade" type="number" inputmode="decimal" placeholder="Ex: 30"></div>
      <div style="flex:1"><label>Sexo</label>
        <select class="inp" id="ob-sexo">
          <option value="M">Masculino</option>
          <option value="F">Feminino</option>
        </select>
      </div>
    </div>
    <label>Nível de atividade</label>
    <select class="inp" id="ob-atv" style="margin-bottom:16px">
      <option value="1.2">Sedentário (sem exercícios)</option>
      <option value="1.375">Leve (1-3x por semana)</option>
      <option value="1.55">Moderado (3-5x por semana)</option>
      <option value="1.725">Intenso (6-7x por semana)</option>
    </select>
    <div id="ob-preview" style="background:var(--acc-bg);border:1.5px solid var(--acc-br);border-radius:10px;padding:12px;margin-bottom:16px;display:none">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px">SUA META ESTIMADA</div>
      <div id="ob-meta-val" style="font-size:24px;font-weight:700;color:var(--acc)"></div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">kcal/dia (déficit de 500 kcal para emagrecer)</div>
    </div>
    <button class="bta" onclick="salvarOnboarding()">Começar! 🚀</button>
    <div class="ferr" id="ob-err" style="margin-top:8px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="profile-bar" id="pbar"></div>
  <div class="header">
    <div><div class="htitle" id="htitle"></div><div class="hsub" id="hsub"></div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div style="font-size:12px;color:var(--text3)" id="hdate"></div>
      <div style="display:flex;align-items:center;gap:5px">
        <span id="sync-status" class="sync-dot"></span>
        <button class="logout-btn" onclick="doLogout()">Sair</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nbtn active" onclick="setAba('hoje')">Hoje</button>
    <button class="nbtn" onclick="setAba('add')">+ Add</button>
    <button class="nbtn" onclick="setAba('hist')">Histórico</button>
    <button class="nbtn" onclick="setAba('perfil')">Perfil</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="toast"></div>

async function saveDay(uid,date,items){
  setSyncStatus('syncing');
  try{await setDoc(doc(db,'users',uid,'dias',date),{items,updatedAt:Date.now()});cachedDays[date]=items;setSyncStatus('ok');}
  catch{setSyncStatus('offline');const fb=JSON.parse(localStorage.getItem('cc_'+uid)||'{}');fb[date]=items;localStorage.setItem('cc_'+uid,JSON.stringify(fb));}
}

async function loadAllDays(uid){
  try{
    const snap=await getDocs(collection(db,'users',uid,'dias'));
    const days={};
    snap.forEach(d=>{days[d.id]=d.data().items||[];});
    // Merge de versões antigas de cache
    ['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid].forEach(k=>{
      try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d]&&fb[d]&&fb[d].length)days[d]=fb[d];});}catch{}
    });
    // Deduplica itens do mesmo dia (corrige o bug do "hoje duplicado")
    Object.keys(days).forEach(d=>{
      const seen=new Set();
      days[d]=(days[d]||[]).filter(x=>{
        const key=x.id+'_'+x.nome+'_'+x.cal;
        if(seen.has(key))return false;
        seen.add(key);return true;
      });
    });
    cachedDays=days;
    localStorage.setItem('cc_'+uid,JSON.stringify(days));
    setSyncStatus('ok');
  }catch{
    const days={};
    ['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid].forEach(k=>{
      try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d])days[d]=fb[d];});}catch{}
    });
    cachedDays=days;setSyncStatus('offline');
  }
}

  const idade=parseInt(document.getElementById('ob-idade').value);
  const sexo=document.getElementById('ob-sexo').value;

  if(peso&&alt&&idade){

onAuthStateChanged(auth,async(user)=>{

    currentUser=user;
    document.getElementById('load-msg').textContent='Carregando seus dados...';
    document.getElementById('loading').style.display='flex';
    const savedPerfil=await loadPerfilCloud(user.uid);
    const perfilFixo=getPerfilFixo(user.email);

    if(perfilFixo){
      // Perfil fixo (Guilherme ou Jessica) — não passa pelo onboarding
      perfil=savedPerfil?{...perfilFixo,...savedPerfil,...perfilFixo}:{...perfilFixo};
    } else if(savedPerfil){
      // Usuário que já fez onboarding
      perfil=savedPerfil;
    } else {
      // Novo usuário — mostra onboarding
      document.getElementById('loading').style.display='none';
      document.getElementById('login-screen').style.display='none';
      document.getElementById('onboard-screen').style.display='flex';
      await Promise.all([loadAllDays(user.uid),loadColaborativos()]);
      return;
    }

    document.body.classList.toggle('jessica',perfil.theme==='blue'||isJessica(user.email));
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    updHeader();
    await Promise.all([loadAllDays(user.uid),loadColaborativos()]);
    document.getElementById('loading').style.display='none';
    render();
  }else{
    currentUser=null;cachedDays={};perfil=null;
    document.getElementById('loading').style.display='none';
    document.getElementById('onboard-screen').style.display='none';
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
});

// ── HOJE ─────────────────────────────────────────────────
function rHoje(w){
  const d=hoje(),items=getDia(d),total=items.reduce((s,x)=>s+x.cal,0);
  const pct=Math.min(total/perfil.meta*100,100),rest=perfil.meta-total;
  const cor=pct<70?'#1a9a50':pct<90?'#c87800':pct<100?'#c85000':'#c03030';
  const C=2*Math.PI*66;
  w.innerHTML+=`<div class="card" style="text-align:center">
    <div class="rw"><svg width="160" height="160" style="transform:rotate(-90deg)">
      <circle cx="80" cy="80" r="66" fill="none" stroke="#d0e0f0" stroke-width="10"/>
      <circle cx="80" cy="80" r="66" fill="none" stroke="${cor}" stroke-width="10"
        stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"
        stroke-linecap="round" style="transition:stroke-dashoffset .6s,stroke .4s"/>
    </svg>
    <div class="rc"><div class="rn" style="color:${cor}">${total}</div><div class="rl">kcal hoje</div></div></div>
    <div style="font-size:14px;font-weight:600;color:${rest>=0?'#1a7a40':'#c03030'}">
      ${rest>=0?`Pode comer mais <b>${rest}</b> kcal`:`Ultrapassado em <b>${Math.abs(rest)}</b> kcal`}
    </div>
    <div class="sr">

      <div><div class="sv">${total}</div><div class="sl">Consumido</div></div>
      <div><div class="sv" style="color:${cor}">${rest>0?rest:0}</div><div class="sl">Restante</div></div>
    </div>
  </div>`;
  if(!items.length){
    w.innerHTML+=`<div class="empty"><div class="ei">🥗</div><div class="et">Nenhum alimento registrado hoje</div>
      <button class="bta" style="width:auto;padding:12px 28px" onclick="setAba('add')">+ Adicionar alimento</button></div>`;
  }else{
    // Agrupa por refeição
    REFS.forEach(ref=>{

      const sub=ri.reduce((s,x)=>s+x.cal,0);

      </div>`;
    });

  }
  w.innerHTML+=`<div class="version-badge">v3.0 · ${new Date().toLocaleDateString('pt-BR')}</div>`;

function showPop(){
  const r=document.getElementById('sres');if(!r)return;
  r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:700">MAIS BUSCADOS</div>`+getBase().slice(0,10).map(a=>fiHTML(a)).join('');
}
function fiHTML(a){
  const n=a.n||(a.product_name_pt||a.product_name||'Produto');
  const m=a.m||(a.marca||a.brands||'');
  const c=a.c||(a.cal100||(a.nutriments?Math.round(a.nutriments['energy-kcal_100g']||0):0));
  const src=a.src||(a.code?'OFF':'');
  return `<div class="fi" onclick="openQtd('${esc(n)}','${esc(m)}',${c})">
    <div class="fin"><div class="fin-n">${n}${src?`<span class="src-badge">${src}</span>`:''}</div>${m?`<div class="fin-b">${m}</div>`:''}</div>
    <div class="fic">${c} kcal/100g</div>
  </div>`;
}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

window.onSrch=async(v)=>{
  clearTimeout(stimer);const r=document.getElementById('sres');if(!r)return;
  if(!v||v.length<2){showPop();return;}
  const q=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const loc=getBase().filter(a=>{
    const nome=(a.n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const marca=(a.m||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return nome.includes(q)||marca.includes(q);
  }).slice(0,15);
  if(loc.length)r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:700">BASE LOCAL</div>`+loc.map(a=>fiHTML(a)).join('');
  if(v.length<3)return;
  stimer=setTimeout(async()=>{
    try{
      const isBC=/^\d{8,14}$/.test(v.replace(/\s/g,''));
      const url=isBC?`https://world.openfoodfacts.org/api/v0/product/${v.replace(/\s/g,'')}.json`:`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(v)}&search_simple=1&action=process&json=1&fields=code,product_name,product_name_pt,brands,nutriments&page_size=10`;
      const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
      const data=await res.json();
      let prods=[];
      if(isBC){if(data.status===1&&data.product)prods=[data.product];}
      else prods=(data.products||[]).filter(p=>{const k=p.nutriments&&p.nutriments['energy-kcal_100g'];return k&&k>0&&(p.product_name_pt||p.product_name);});
      if(prods.length){
        r.innerHTML=(loc.length?r.innerHTML:'')+`<div style="font-size:12px;color:var(--text3);margin:${loc.length?10:0}px 0 8px;font-weight:700">OPEN FOOD FACTS</div>`+prods.map(p=>fiHTML({n:p.product_name_pt||p.product_name,m:p.brands,c:Math.round(p.nutriments['energy-kcal_100g']),src:'OFF'})).join('');
      }else if(!loc.length)r.innerHTML=`<div class="lding">Nenhum resultado. Adicione manualmente!</div>`;
    }catch{if(!loc.length)r.innerHTML=`<div class="lding">Sem conexão. Adicione manualmente.</div>`;}
  },600);
};

// ── HISTÓRICO ────────────────────────────────────────────
function rHist(w){
  // Remove duplicatas de datas (Hoje vs data real)
  // Mescla entradas duplicadas do mesmo dia
  const hj=hoje();
  Object.keys(cachedDays).forEach(k=>{
    if(k!==hj){
      const kDate=new Date(k+'T12:00').toISOString().split('T')[0];
      if(kDate===hj&&k!==hj){
        cachedDays[hj]=[...(cachedDays[hj]||[]),...(cachedDays[k]||[])];
        delete cachedDays[k];
      }
    }
  });
  // Deduplica por id dentro de cada dia
  Object.keys(cachedDays).forEach(d=>{
    const seen=new Set();
    cachedDays[d]=(cachedDays[d]||[]).filter(x=>{if(seen.has(x.id))return false;seen.add(x.id);return true;});
  });
  const allKeys=[...new Set(Object.keys(cachedDays))].sort().reverse();
  const totalDias=allKeys.length,start=histPage*HIST_PAGE,pageKeys=allKeys.slice(start,start+HIST_PAGE);
  const hasPrev=histPage>0,hasNext=start+HIST_PAGE<totalDias;
  const totalCal=allKeys.reduce((s,d)=>s+(cachedDays[d]||[]).reduce((ss,x)=>ss+x.cal,0),0);
  const media=totalDias?Math.round(totalCal/totalDias):0;
  const ok=allKeys.filter(d=>{const t=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);return t>0&&t<=perfil.meta*1.1;});
  const rows=!pageKeys.length?`<div style="color:var(--text3);font-size:14px">Sem registros ainda</div>`
    :pageKeys.map(d=>{
      const dt=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);
      const pct=Math.min(dt/perfil.meta*100,100),cor=pct<90?'#1a9a50':pct<105?'#c87800':'#c03030';
      const dateObj=new Date(d+'T12:00');
      const lbl=d===hj?'Hoje ⭐':dateObj.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:dateObj.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
      const items=cachedDays[d]||[];
      const det=items.map(x=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--bg3)"><span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.nome}${x.qtd?' ('+x.qtd+')':''}</span><span style="color:var(--acc);font-weight:700;margin-left:8px;flex-shrink:0">${x.cal} kcal</span></div>`).join('');
      return `<div class="hrow"><div class="hh" style="cursor:pointer" onclick="togDetail('dd_${d}')">
        <span style="color:${d===hj?'var(--acc)':'var(--text)'};font-weight:${d===hj?'700':'500'}">${lbl}</span>
        <span style="color:${cor};font-weight:700;display:flex;align-items:center;gap:6px">${dt} / ${perfil.meta} <span style="font-size:12px;color:var(--text3)" id="arr_${d}">▸</span></span>
      </div><div class="hbw"><div class="hb" style="width:${pct}%;background:${cor}"></div></div>
      <div id="dd_${d}" style="display:none;margin-top:10px">${det||'<div style="font-size:13px;color:var(--text3);padding:5px 0">Sem detalhes</div>'}</div></div>`;
    }).join('');
  const fD=pageKeys.length?new Date(pageKeys[pageKeys.length-1]+'T12:00'):null;
  const lD=pageKeys.length?new Date(pageKeys[0]+'T12:00'):null;
  const pLabel=fD&&lD?(fD.getMonth()===lD.getMonth()&&fD.getFullYear()===lD.getFullYear()?fD.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):fD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})+' – '+lD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})):'';
  w.innerHTML=`
  <div class="card" style="padding:0;overflow:hidden;display:flex">
    ${[['Total','de dias',totalDias],['Dentro','da meta',ok.length],['Média','kcal/dia',media]].map(([a,b,v],i)=>`
    <div style="flex:1;text-align:center;padding:16px 8px;${i<2?'border-right:1px solid var(--border)':''}">
      <div style="font-size:26px;font-weight:700;color:var(--acc)">${v}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${a}<br>${b}</div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="ctitle" style="margin-bottom:0">Registros${pLabel?' · '+pLabel:''}</div>
      <div style="font-size:12px;color:var(--text3)">${totalDias?start+1+'-'+Math.min(start+HIST_PAGE,totalDias)+' / '+totalDias:'0'}</div>
    </div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="histNav(-1)" style="flex:1;background:${hasPrev?'var(--bg3)':'var(--bg2)'};border:1.5px solid ${hasPrev?'var(--acc-br)':'var(--border)'};border-radius:9px;padding:12px;color:${hasPrev?'var(--acc)':'var(--text3)'};font-size:13px;font-weight:700;cursor:${hasPrev?'pointer':'default'}">← Recentes</button>
      <button onclick="histNav(1)" style="flex:1;background:${hasNext?'var(--bg3)':'var(--bg2)'};border:1.5px solid ${hasNext?'var(--acc-br)':'var(--border)'};border-radius:9px;padding:12px;color:${hasNext?'var(--acc)':'var(--text3)'};font-size:13px;font-weight:700;cursor:${hasNext?'pointer':'default'}">Antigos →</button>
    </div>
  </div>`;
}
window.togDetail=(id)=>{const el=document.getElementById(id);if(!el)return;const open=el.style.display!=='none';el.style.display=open?'none':'block';const arr=document.getElementById('arr_'+id.replace('dd_',''));if(arr)arr.textContent=open?'▸':'▾';};

    ${[['Peso',p.peso+' kg'],['Altura',(p.alt||'—')+' cm'],['IMC',imc+' · '+cls],['TDEE estimado','~'+tmb+' kcal/dia']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
  </div>
  <div class="card"><div class="ctitle">Plano alimentar</div>

window.salvarPerfil=async()=>{
  const nome=document.getElementById('ep-nome').value.trim();
  const peso=parseFloat(document.getElementById('ep-peso').value);
  const alt=parseFloat(document.getElementById('ep-alt').value);
  const idade=parseInt(document.getElementById('ep-idade').value);
  const sexo=document.getElementById('ep-sexo').value;
  const atv=parseFloat(document.getElementById('ep-atv').value);
  const metaInput=parseInt(document.getElementById('ep-meta').value);
  if(!nome||!peso||!alt||!idade){toast('Preencha todos os campos');return;}
  const novo={...perfil,nome,peso,alt,idade,sexo,atv};
  novo.tmb=calcTMB(novo);
  novo.meta=metaInput&&metaInput>0?metaInput:Math.max(Math.round(novo.tmb-500),1200);
  novo.ini=nome.substring(0,2).toUpperCase();
  perfil=novo;fecharEdicao();updHeader();
  await savePerfilCloud(currentUser.uid,perfil);
  toast('✓ Perfil atualizado!');render();
};

document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
</script>
</body>
