<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f0f0f;color:#e8e8e8;font-family:Arial,Helvetica,sans-serif;overflow:hidden;font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
:root{--acc:#d4a843;--acc-bg:#d4a84320;--acc-br:#d4a84360;--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--border:#2e2e2e;--text:#e8e8e8;--text2:#aaa;--text3:#666}
body.jessica{--acc:#4d9ef5;--acc-bg:#4d9ef520;--acc-br:#4d9ef560}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.load-title{font-size:22px;font-weight:700;color:var(--acc);margin-bottom:8px}
.load-sub{font-size:14px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
.lspn{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:20px}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200}
.login-logo{font-size:26px;font-weight:700;color:var(--acc);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:360px}
.login-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center}
.login-tabs{display:flex;margin-bottom:18px;background:var(--bg);border-radius:8px;padding:3px}
.ltab{flex:1;background:none;border:none;padding:9px;font-size:14px;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .2s}
.ltab.active{background:var(--bg3);color:var(--acc);font-weight:600}
.finp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s;margin-bottom:10px}
.finp:focus{border-color:var(--acc)}
.finp::placeholder{color:var(--text3)}
.fbta{background:var(--acc);color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s;margin-top:4px}
.fbta:active{filter:brightness(.9)}
.ferr{font-size:13px;color:#f87171;text-align:center;min-height:18px;margin-bottom:8px}
.flink{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-align:center;width:100%;margin-top:12px}

.profile-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.pbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:13px;border-bottom:2px solid transparent;transition:all .25s}
.pbtn .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bg3);border:2px solid var(--border);transition:all .25s;flex-shrink:0}
.pbtn.au1{color:#d4a843;border-bottom-color:#d4a843}
.pbtn.au1 .av{background:#d4a84320;border-color:#d4a843;color:#d4a843}
.pbtn.au2{color:#4d9ef5;border-bottom-color:#4d9ef5}
.pbtn.au2 .av{background:#4d9ef520;border-color:#4d9ef5;color:#4d9ef5}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.htitle{font-size:20px;font-weight:700;color:var(--acc)}
.hsub{font-size:12px;color:var(--text3);margin-top:2px}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:12px;padding:5px 10px;cursor:pointer}
.logout-btn:active{border-color:var(--text2);color:var(--text)}

.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.nbtn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:11px 4px;font-size:12px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nbtn.active{color:var(--acc);border-bottom-color:var(--acc)}

.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.ctitle{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}
.rw{position:relative;width:160px;height:160px;margin:0 auto 12px}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rn{font-size:36px;font-weight:700;line-height:1}
.rl{font-size:12px;color:var(--text3);margin-top:4px}
.sr{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid var(--border)}
.sv{font-size:18px;font-weight:600;text-align:center}
.sl{font-size:12px;color:var(--text3);margin-top:3px;text-align:center}
.rfh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rfn{font-size:15px;font-weight:700;color:var(--acc)}
.rfc{font-size:13px;color:var(--text2)}
.ir{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3)}

.in{font-size:14px;line-height:1.4;max-width:185px}
.ib{font-size:12px;color:var(--text3);margin-top:2px}
.iright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ical{font-size:14px;font-weight:600;color:var(--acc)}
.iedit{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 5px;transition:color .15s}
.iedit:active{color:var(--acc)}
.rmb{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:3px 5px;line-height:1;transition:color .15s}

.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--text2)}
.tag.sel{background:var(--acc-bg);border-color:var(--acc-br);color:var(--acc);font-weight:600}
.inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--text3)}
select.inp{cursor:pointer}
.bta{background:var(--acc);color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s}
.bta:active{filter:brightness(.9)}
.btl{background:none;border:none;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;padding:0}

.fi{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;cursor:pointer;margin-bottom:6px;transition:background .15s;gap:10px}
.fi:active{background:#2a2a2a}
.fin{flex:1;min-width:0}
.fin-n{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.fin-b{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fic{font-size:13px;font-weight:600;color:var(--acc);flex-shrink:0}
.lding{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.spn{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}

.ei{font-size:42px;margin-bottom:12px}
.et{font-size:15px;margin-bottom:18px;color:var(--text2)}
#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--acc);color:#000;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.moverlay{position:fixed;inset:0;background:#000c;display:flex;align-items:flex-end;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--acc);border-radius:18px 18px 0 0;padding:22px;padding-bottom:max(22px,env(safe-area-inset-bottom));width:100%;max-height:75vh;overflow-y:auto}
.mt{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.ms{font-size:13px;color:var(--text3);margin-bottom:16px}
@keyframes mIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{animation:mIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:sIn .22s ease}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;margin-left:5px;vertical-align:middle}
.sync-dot.syncing{background:#facc15;animation:pulse 1s infinite}
.sync-dot.offline{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.src-badge{font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;color:var(--text3);margin-left:5px;vertical-align:middle}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px}
</style>
</head>
<body>

<div id="loading">
  <div class="lspn"></div>
  <div class="load-title">Controle Calórico</div>
  <div class="load-sub" id="load-msg">Conectando...</div>
</div>

<div id="login-screen" style="display:none">

      <button class="ltab" onclick="setLoginTab('register')">Criar conta</button>
    </div>
    <div class="ferr" id="ferr"></div>
    <input class="finp" id="f-email" type="email" placeholder="E-mail" autocomplete="email">
    <input class="finp" id="f-pass" type="password" placeholder="Senha" autocomplete="current-password">
    <div id="f-name-wrap" style="display:none">
      <input class="finp" id="f-name" type="text" placeholder="Seu nome">
    </div>
    <button class="fbta" id="f-btn" onclick="doAuth()">Entrar</button>
    <button class="flink" onclick="doReset()">Esqueci a senha</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="profile-bar" id="pbar"></div>
  <div class="header">
    <div><div class="htitle" id="htitle"></div><div class="hsub" id="hsub"></div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">

      <div style="display:flex;align-items:center;gap:5px">
        <span id="sync-status" class="sync-dot"></span>
        <button class="logout-btn" onclick="doLogout()">Sair</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nbtn active" onclick="setAba('hoje')">Hoje</button>

    <button class="nbtn" onclick="setAba('hist')">Histórico</button>
    <button class="nbtn" onclick="setAba('perfil')">Perfil</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="toast"></div>

function hoje(){return new Date().toISOString().split('T')[0];}
function setSyncStatus(s){const d=document.getElementById('sync-status');if(!d)return;d.className='sync-dot'+(s==='syncing'?' syncing':s==='offline'?' offline':'');}

function calcTMB(p){const tmb=p.sexo==='M'?(10*p.peso+6.25*p.alt-5*p.idade+5):(10*p.peso+6.25*p.alt-5*p.idade-161);return Math.round(tmb*1.2);}

function getPerfil(email,saved){
  if(saved)return saved;
  if(!email)return{nome:'Usuário',ini:'US',peso:70,alt:170,idade:25,sexo:'M',meta:1400,cor:'#d4a843',theme:'gold'};
  if(email.toLowerCase().includes('jessica'))return{nome:'Jessica',ini:'JE',peso:91,alt:165,idade:30,sexo:'F',meta:1380,cor:'#4d9ef5',theme:'blue'};
  return{nome:'Você',ini:'EU',peso:100,alt:177,idade:25,sexo:'M',meta:1600,cor:'#d4a843',theme:'gold'};
}

// ── FIRESTORE ────────────────────────────────────────────
async function saveDay(uid,date,items){
  setSyncStatus('syncing');
  try{await setDoc(doc(db,'users',uid,'dias',date),{items,updatedAt:Date.now()});cachedDays[date]=items;setSyncStatus('ok');}
  catch{setSyncStatus('offline');const fb=JSON.parse(localStorage.getItem('cc_'+uid)||'{}');fb[date]=items;localStorage.setItem('cc_'+uid,JSON.stringify(fb));}
}
async function loadAllDays(uid){
  try{
    const snap=await getDocs(collection(db,'users',uid,'dias'));
    const days={};snap.forEach(d=>{days[d.id]=d.data().items||[];});
    // Merge cache de todas as versões anteriores do app
    ['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid,'cc3_'+uid].forEach(k=>{
      try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d]&&fb[d]&&fb[d].length)days[d]=fb[d];});}catch{}
    });
    cachedDays=days;
    localStorage.setItem('cc_'+uid,JSON.stringify(days));
    setSyncStatus('ok');
  }catch{
    const days={};
    ['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid].forEach(k=>{
      try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d])days[d]=fb[d];});}catch{}
    });
    cachedDays=days;setSyncStatus('offline');
  }
}
async function savePerfilCloud(uid,p){try{await setDoc(doc(db,'users',uid,'config','perfil'),p);}catch{localStorage.setItem('cc_perf_'+uid,JSON.stringify(p));}}
async function loadPerfilCloud(uid){try{const d=await getDoc(doc(db,'users',uid,'config','perfil'));return d.exists()?d.data():null;}catch{const s=localStorage.getItem('cc_perf_'+uid);return s?JSON.parse(s):null;}}

// Salva alimento colaborativo no Firestore global
async function salvarColaborativo(item){
  try{
    await setDoc(doc(db,'global','alimentos_colaborativos'),{lista:arrayUnion({n:item.nome,c:item.cal100||Math.round(item.cal/(parseFloat(item.qtd)||100)*100),m:item.marca||'',src:'Comunidade'})},{merge:true});
    BASE_COLABORATIVA.push({n:item.nome,c:item.cal100||Math.round(item.cal/(parseFloat(item.qtd)||100)*100),m:item.marca||'',src:'Comunidade'});
  }catch{}
}

function getDia(date){return cachedDays[date]||[];}
async function addItem(item){const d=hoje();const items=[...getDia(d),item];cachedDays[d]=items;render();await saveDay(currentUser.uid,d,items);}
async function removeItem(date,id){const items=(cachedDays[date]||[]).filter(x=>x.id!==id);cachedDays[date]=items;render();await saveDay(currentUser.uid,date,items);}
async function updateItem(date,id,changes){const items=(cachedDays[date]||[]).map(x=>x.id===id?{...x,...changes}:x);cachedDays[date]=items;render();await saveDay(currentUser.uid,date,items);}

let loginTab='login';
window.setLoginTab=(t)=>{
  loginTab=t;
  document.querySelectorAll('.ltab').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===t));
  document.getElementById('login-title').textContent=t==='login'?'Entrar':'Criar conta';
  document.getElementById('f-btn').textContent=t==='login'?'Entrar':'Criar conta';
  document.getElementById('f-name-wrap').style.display=t==='register'?'block':'none';
  document.getElementById('ferr').textContent='';
};
window.doAuth=async()=>{
  const email=document.getElementById('f-email').value.trim(),pass=document.getElementById('f-pass').value;
  const err=document.getElementById('ferr');err.textContent='';
  if(!email||!pass){err.textContent='Preencha email e senha';return;}
  document.getElementById('f-btn').textContent='Aguarde...';
  try{loginTab==='login'?await signInWithEmailAndPassword(auth,email,pass):await createUserWithEmailAndPassword(auth,email,pass);}
  catch(e){const msgs={'auth/invalid-email':'Email inválido','auth/wrong-password':'Senha incorreta','auth/user-not-found':'Usuário não encontrado','auth/email-already-in-use':'Email já cadastrado','auth/weak-password':'Mínimo 6 caracteres','auth/invalid-credential':'Email ou senha incorretos'};err.textContent=msgs[e.code]||e.message;document.getElementById('f-btn').textContent=loginTab==='login'?'Entrar':'Criar conta';}
};
window.doReset=async()=>{
  const email=document.getElementById('f-email').value.trim();
  if(!email){document.getElementById('ferr').textContent='Digite seu email primeiro';return;}
  try{await sendPasswordResetEmail(auth,email);document.getElementById('ferr').style.color='#4ade80';document.getElementById('ferr').textContent='Email de recuperação enviado!';}
  catch{document.getElementById('ferr').textContent='Erro ao enviar email';}
};
window.doLogout=async()=>{await signOut(auth);};

onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById('load-msg').textContent='Carregando dados...';
    document.getElementById('loading').style.display='flex';
    const savedPerfil=await loadPerfilCloud(user.uid);
    perfil={...getPerfil(user.email,savedPerfil)};
    if(perfil.peso&&perfil.alt&&perfil.idade)perfil.tmb=calcTMB(perfil);
    document.body.classList.toggle('jessica',perfil.theme==='blue'||(perfil.cor&&perfil.cor.includes('4d9ef5')));
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    updHeader();
    await Promise.all([loadAllDays(user.uid),loadColaborativos()]);
    document.getElementById('loading').style.display='none';
    render();
  }else{
    currentUser=null;cachedDays={};perfil=null;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
});

// ── HOJE ─────────────────────────────────────────────────
function rHoje(w){
  const d=hoje(),items=getDia(d),total=items.reduce((s,x)=>s+x.cal,0);
  const pct=Math.min(total/perfil.meta*100,100),rest=perfil.meta-total;
  const cor=pct<70?'#4ade80':pct<90?'#facc15':pct<100?'#fb923c':'#f87171';
  const C=2*Math.PI*66;
  w.innerHTML+=`<div class="card">
    <div class="rw"><svg width="160" height="160" style="transform:rotate(-90deg)">
      <circle cx="80" cy="80" r="66" fill="none" stroke="#222" stroke-width="10"/>
      <circle cx="80" cy="80" r="66" fill="none" stroke="${cor}" stroke-width="10"
        stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"
        stroke-linecap="round" style="transition:stroke-dashoffset .6s,stroke .4s"/>
    </svg>
    <div class="rc"><div class="rn" style="color:${cor}">${total}</div><div class="rl">kcal hoje</div></div></div>
    <div style="text-align:center;font-size:14px;color:${rest>=0?'#4ade80':'#f87171'}">
      ${rest>=0?`Pode comer mais <b>${rest}</b> kcal`:`Ultrapassado em <b>${Math.abs(rest)}</b> kcal`}
    </div>
    <div class="sr">
      <div><div class="sv">${perfil.meta}</div><div class="sl">Meta</div></div>
      <div><div class="sv">${total}</div><div class="sl">Consumido</div></div>
      <div><div class="sv" style="color:${cor}">${rest>0?rest:0}</div><div class="sl">Restante</div></div>
    </div>
  </div>`;
  if(!items.length){
    w.innerHTML+=`<div class="empty"><div class="ei">🥗</div><div class="et">Nenhum alimento registrado hoje</div>
      <button class="bta" style="width:auto;padding:12px 28px" onclick="setAba('add')">+ Adicionar alimento</button></div>`;
  }else{
    REFS.forEach(ref=>{
      const ri=items.filter(x=>x.refeicao===ref);if(!ri.length)return;
      const sub=ri.reduce((s,x)=>s+x.cal,0);
      w.innerHTML+=`<div class="card"><div class="rfh"><span class="rfn">${ref}</span><span class="rfc">${sub} kcal</span></div>
        ${ri.map(x=>`<div class="ir">
          <div><div class="in">${x.nome}</div>${x.marca||x.qtd?`<div class="ib">${[x.marca,x.qtd].filter(Boolean).join(' · ')}</div>`:''}</div>
          <div class="iright">
            <span class="ical">${x.cal} kcal</span>
            <button class="iedit" onclick="abrirEdicaoItem('${d}',${x.id})" title="Editar">✏️</button>
            <button class="rmb" onclick="rmItem('${d}',${x.id})">×</button>
          </div>
        </div>`).join('')}
      </div>`;
    });
    w.innerHTML+=`<button class="bta" onclick="setAba('add')">+ Adicionar mais</button>`;
  }
}
window.rmItem=async(d,id)=>{await removeItem(d,id);};

// ── EDITAR ITEM ──────────────────────────────────────────
window.abrirEdicaoItem=(date,id)=>{
  const items=cachedDays[date]||[];
  const item=items.find(x=>x.id===id);
  if(!item)return;
  const ov=document.createElement('div');ov.className='moverlay';ov.id='iedit-ov';
  ov.onclick=e=>{if(e.target===ov)fecharEdicaoItem();};
  ov.innerHTML=`<div class="modal">
    <div class="mt">Editar alimento</div>
    <div class="ms">${item.nome}</div>
    <label>Quantidade (gramas ou ml)</label>
    <input class="inp" id="ei-qtd" type="number" inputmode="decimal" placeholder="Ex: 150" value="${parseFloat(item.qtd)||''}" style="margin-bottom:12px;font-size:18px;padding:14px">
    <div id="ei-prev" style="font-size:18px;font-weight:700;text-align:center;min-height:28px;margin-bottom:14px;color:var(--acc)"></div>
    <label>Ou edite as calorias diretamente</label>
    <input class="inp" id="ei-cal" type="number" inputmode="decimal" value="${item.cal}" style="margin-bottom:14px">
    <label>Refeição</label>
    <select class="inp" id="ei-ref" style="margin-bottom:16px">
      ${REFS.map(r=>`<option value="${r}" ${r===item.refeicao?'selected':''}>${r}</option>`).join('')}
    </select>
    <button class="bta" onclick="salvarEdicaoItem('${date}',${id})">Salvar</button>
    <button onclick="fecharEdicaoItem()" style="background:none;border:none;color:var(--text3);font-size:13px;width:100%;padding:12px;cursor:pointer;margin-top:4px">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
  // Calcula preview ao digitar quantidade
  const cal100=item.qtd?Math.round(item.cal/(parseFloat(item.qtd)||100)*100):item.cal;
  document.getElementById('ei-qtd').addEventListener('input',function(){
    const q=parseFloat(this.value);
    if(q>0){document.getElementById('ei-cal').value=Math.round(cal100*q/100);document.getElementById('ei-prev').textContent='≈ '+Math.round(cal100*q/100)+' kcal';}
    else document.getElementById('ei-prev').textContent='';
  });
};
window.fecharEdicaoItem=()=>{const o=document.getElementById('iedit-ov');if(o)o.remove();};
window.salvarEdicaoItem=async(date,id)=>{
  const qtdRaw=document.getElementById('ei-qtd').value;
  const cal=parseInt(document.getElementById('ei-cal').value);
  const refeicao=document.getElementById('ei-ref').value;
  if(!cal||cal<=0){toast('Informe as calorias');return;}
  await updateItem(date,id,{cal,qtd:qtdRaw?qtdRaw+'g':undefined,refeicao});
  fecharEdicaoItem();toast('✓ Atualizado!');
};

// ── ADICIONAR ────────────────────────────────────────────
function rAdd(w){
  w.innerHTML=`
  <div class="card"><div class="ctitle">Qual refeição?</div>
    <div class="tags" id="tref">${REFS.map(r=>`<span class="tag${r===refSel?' sel':''}" onclick="selR('${r}')">${r}</span>`).join('')}</div>
  </div>
  <div class="card"><div class="ctitle">Buscar alimento</div>
    <input class="inp" id="sinp" placeholder="Nome, marca ou código de barras..." oninput="onSrch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="sres" class="sres"></div>
  </div>
  <div class="card">
    <button class="btl" onclick="togCustom()">▸ Adicionar manualmente</button>
    <div class="cform" id="cform" style="display:none">
      <label>Nome do alimento</label>
      <input class="inp" id="cn" style="margin-bottom:10px" autocomplete="off">
      <div class="r2" style="margin-bottom:10px">
        <div style="flex:1"><label>Kcal totais</label><input class="inp" id="cc" type="number" inputmode="decimal"></div>
        <div style="flex:1"><label>Quantidade</label><input class="inp" id="cq" placeholder="ex: 150g" autocomplete="off"></div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">✅ Será salvo para toda a comunidade</div>
      <button class="bta" onclick="addCustom()">Adicionar</button>
    </div>
  </div>`;
  showPop();
}
window.selR=(r)=>{refSel=r;document.querySelectorAll('#tref .tag').forEach(t=>t.classList.toggle('sel',t.textContent===r));};
window.togCustom=()=>{const f=document.getElementById('cform');const b=f.previousElementSibling;const show=f.style.display==='none';f.style.display=show?'block':'none';b.textContent=show?'▾ Adicionar manualmente':'▸ Adicionar manualmente';};
window.addCustom=async()=>{
  const n=document.getElementById('cn').value.trim(),c=parseInt(document.getElementById('cc').value),q=document.getElementById('cq').value.trim();
  if(!n||!c){toast('Preencha nome e kcal');return;}
  const item={id:Date.now(),nome:n,marca:'',cal:c,qtd:q,refeicao:refSel,hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})};
  await addItem(item);
  // Salva na base colaborativa
  const qtdNum=parseFloat(q)||100;
  await salvarColaborativo({nome:n,cal:c,cal100:Math.round(c/qtdNum*100),marca:'',qtd:q});
  toast('✓ Adicionado e salvo na comunidade!');setAba('hoje');
};

function showPop(){
  const r=document.getElementById('sres');if(!r)return;
  r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600">MAIS BUSCADOS</div>`
    +getBaseCompleta().slice(0,10).map(a=>fiHTML(a)).join('');
}
function fiHTML(a){
  const n=a.n||(a.product_name_pt||a.product_name||'Produto');
  const m=a.m||(a.marca||a.brands||'');
  const c=a.c||(a.cal100||(a.nutriments?Math.round(a.nutriments['energy-kcal_100g']||0):0));
  const src=a.src||(a.code?'OFF':'');
  return `<div class="fi" onclick="openQtd('${esc(n)}','${esc(m)}',${c})">
    <div class="fin"><div class="fin-n">${n}${src?`<span class="src-badge">${src}</span>`:''}</div>${m?`<div class="fin-b">${m}</div>`:''}</div>
    <div class="fic">${c} kcal/100g</div>
  </div>`;
}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

window.onSrch=async(v)=>{
  clearTimeout(stimer);const r=document.getElementById('sres');if(!r)return;
  if(!v||v.length<2){showPop();return;}
  const q=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const base=getBaseCompleta();
  const loc=base.filter(a=>{
    const nome=(a.n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const marca=(a.m||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return nome.includes(q)||marca.includes(q);
  }).slice(0,15);
  if(loc.length)r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600">BASE LOCAL</div>`+loc.map(a=>fiHTML(a)).join('');
  if(v.length<3)return;
  stimer=setTimeout(async()=>{
    try{
      const isBC=/^\d{8,14}$/.test(v.replace(/\s/g,''));
      const url=isBC?`https://world.openfoodfacts.org/api/v0/product/${v.replace(/\s/g,'')}.json`:`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(v)}&search_simple=1&action=process&json=1&fields=code,product_name,product_name_pt,brands,nutriments&page_size=10`;
      const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
      const data=await res.json();
      let prods=[];
      if(isBC){if(data.status===1&&data.product)prods=[data.product];}
      else prods=(data.products||[]).filter(p=>{const k=p.nutriments&&p.nutriments['energy-kcal_100g'];return k&&k>0&&(p.product_name_pt||p.product_name);});
      if(prods.length){
        const oH=`<div style="font-size:12px;color:var(--text3);margin:${loc.length?10:0}px 0 8px;font-weight:600">OPEN FOOD FACTS</div>`+prods.map(p=>fiHTML({n:p.product_name_pt||p.product_name,m:p.brands,c:Math.round(p.nutriments['energy-kcal_100g']),src:'OFF'})).join('');
        r.innerHTML=(loc.length?r.innerHTML:'')+oH;
      }else if(!loc.length)r.innerHTML=`<div class="lding">Nenhum resultado. Adicione manualmente — será salvo para todos!</div>`;
    }catch{if(!loc.length)r.innerHTML=`<div class="lding">Sem conexão. Adicione manualmente.</div>`;}
  },600);
};

window.openQtd=(n,m,c100)=>{
  pFood={n,m,c100};
  const ov=document.createElement('div');ov.className='moverlay';ov.id='qov';
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  ov.innerHTML=`<div class="modal"><div class="mt">${n}</div><div class="ms">${m?m+' · ':''}${c100} kcal por 100g</div>
    <label>Quantidade em gramas ou ml</label>
    <input class="inp" id="qinp" type="number" inputmode="decimal" placeholder="Ex: 150" style="font-size:18px;padding:14px;margin-bottom:8px">
    <div id="qprev" style="font-size:22px;font-weight:700;text-align:center;min-height:34px;margin:8px 0 16px;color:var(--acc)"></div>
    <button class="bta" onclick="confQtd()">Adicionar</button>
    <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:14px;width:100%;padding:12px;cursor:pointer;margin-top:4px">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('qinp').focus(),150);
  document.getElementById('qinp').addEventListener('input',function(){const q=parseFloat(this.value);document.getElementById('qprev').textContent=q>0?`≈ ${Math.round(c100*q/100)} kcal`:'';});
};
window.closeModal=()=>{const o=document.getElementById('qov');if(o)o.remove();pFood=null;};
window.confQtd=async()=>{
  const q=parseFloat(document.getElementById('qinp').value);
  if(!q||q<=0){toast('Informe a quantidade');return;}
  const cal=Math.round(pFood.c100*q/100);
  await addItem({id:Date.now(),nome:pFood.n,marca:pFood.m||'',cal,qtd:q+'g',refeicao:refSel,hora:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
  closeModal();toast(`✓ +${cal} kcal!`);setAba('hoje');
};

// ── HISTÓRICO ────────────────────────────────────────────
function rHist(w){
  const allKeys=Object.keys(cachedDays).sort().reverse();
  const totalDias=allKeys.length,start=histPage*HIST_PAGE,pageKeys=allKeys.slice(start,start+HIST_PAGE);
  const hasPrev=histPage>0,hasNext=start+HIST_PAGE<totalDias;
  const totalCal=allKeys.reduce((s,d)=>s+(cachedDays[d]||[]).reduce((ss,x)=>ss+x.cal,0),0);
  const media=totalDias?Math.round(totalCal/totalDias):0;
  const ok=allKeys.filter(d=>{const t=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);return t>0&&t<=perfil.meta*1.1;});
  const rows=!pageKeys.length?`<div style="color:var(--text3);font-size:14px">Sem registros ainda</div>`
    :pageKeys.map(d=>{
      const dt=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);
      const pct=Math.min(dt/perfil.meta*100,100),cor=pct<90?'#4ade80':pct<105?'#facc15':'#f87171';
      const dateObj=new Date(d+'T12:00');
      const lbl=d===hoje()?'Hoje':dateObj.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:dateObj.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
      const items=cachedDays[d]||[];
      const det=items.map(x=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--bg3)"><span style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.nome}${x.qtd?' ('+x.qtd+')':''}</span><span style="color:var(--acc);font-weight:600;margin-left:8px;flex-shrink:0">${x.cal} kcal</span></div>`).join('');
      return `<div class="hrow"><div class="hh" style="cursor:pointer" onclick="togDetail('dd_${d}')">
        <span style="color:${d===hoje()?'var(--acc)':'var(--text2)'};font-weight:${d===hoje()?'700':'400'}">${lbl}</span>
        <span style="color:${cor};font-weight:600;display:flex;align-items:center;gap:6px">${dt} / ${perfil.meta} <span style="font-size:12px;color:var(--text3)" id="arr_${d}">▸</span></span>
      </div><div class="hbw"><div class="hb" style="width:${pct}%;background:${cor}"></div></div>
      <div id="dd_${d}" style="display:none;margin-top:10px">${det||'<div style="font-size:13px;color:var(--text3);padding:5px 0">Sem detalhes</div>'}</div></div>`;
    }).join('');
  const fD=pageKeys.length?new Date(pageKeys[pageKeys.length-1]+'T12:00'):null;
  const lD=pageKeys.length?new Date(pageKeys[0]+'T12:00'):null;
  const pLabel=fD&&lD?(fD.getMonth()===lD.getMonth()&&fD.getFullYear()===lD.getFullYear()?fD.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):fD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})+' – '+lD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})):'';
  w.innerHTML=`
  <div class="card" style="padding:0;overflow:hidden;display:flex">
    ${[['Total','de dias',totalDias],['Dentro','da meta',ok.length],['Média','kcal/dia',media]].map(([a,b,v],i)=>`
    <div style="flex:1;text-align:center;padding:16px 8px;${i<2?'border-right:1px solid var(--border)':''}">
      <div style="font-size:26px;font-weight:700;color:var(--acc)">${v}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${a}<br>${b}</div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="ctitle" style="margin-bottom:0">Registros${pLabel?' · '+pLabel:''}</div>
      <div style="font-size:12px;color:var(--text3)">${totalDias?start+1+'-'+Math.min(start+HIST_PAGE,totalDias)+' / '+totalDias:'0'}</div>
    </div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="histNav(-1)" style="flex:1;background:${hasPrev?'var(--bg3)':'var(--bg2)'};border:1px solid ${hasPrev?'#444':'var(--border)'};border-radius:9px;padding:12px;color:${hasPrev?'var(--text)':'var(--text3)'};font-size:13px;font-weight:600;cursor:${hasPrev?'pointer':'default'}">← Recentes</button>
      <button onclick="histNav(1)" style="flex:1;background:${hasNext?'var(--bg3)':'var(--bg2)'};border:1px solid ${hasNext?'#444':'var(--border)'};border-radius:9px;padding:12px;color:${hasNext?'var(--text)':'var(--text3)'};font-size:13px;font-weight:600;cursor:${hasNext?'pointer':'default'}">Antigos →</button>
    </div>
  </div>`;
}
window.togDetail=(id)=>{const el=document.getElementById(id);if(!el)return;const open=el.style.display!=='none';el.style.display=open?'none':'block';const arr=document.getElementById('arr_'+id.replace('dd_',''));if(arr)arr.textContent=open?'▸':'▾';};
window.histNav=(dir)=>{const total=Object.keys(cachedDays).length,np=histPage+dir;if(np<0||np*HIST_PAGE>=total)return;histPage=np;render();};

// ── PERFIL ───────────────────────────────────────────────
function rPerfil(w){
  const p=perfil;
  const imc=(p.peso/Math.pow((p.alt||170)/100,2)).toFixed(1);
  const cls=imc<25?'Peso normal':imc<30?'Sobrepeso':imc<35?'Obesidade grau I':'Obesidade grau II';
  const tmb=calcTMB(p),def=Math.round(tmb-p.meta);
  const kgSem=(def/7700*7).toFixed(2),alvo=Math.round(p.peso*0.85);
  const sems=Math.round((p.peso-alvo)/Math.max(parseFloat(kgSem),0.01));
  w.innerHTML=`
  <div class="card" style="text-align:center;padding:22px">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--acc-bg);border:2px solid var(--acc-br);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;font-weight:700;color:var(--acc)">${p.ini||'?'}</div>
    <div style="font-size:20px;font-weight:700">${p.nome}</div>
    <div style="font-size:13px;color:var(--text2);margin-top:5px">${p.idade} anos · ${p.sexo==='M'?'Masculino':'Feminino'} · Sedentário</div>
    <div style="font-size:12px;color:var(--text3);margin-top:3px">${currentUser?.email}</div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="ctitle" style="margin-bottom:0">Dados físicos</div>
      <button class="btl" onclick="abrirEdicaoPerfil()">✏️ Editar</button>
    </div>
    ${[['Peso',p.peso+' kg'],['Altura',(p.alt||'—')+' cm'],['IMC',imc+' · '+cls],['TMB estimada','~'+tmb+' kcal/dia']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
  </div>
  <div class="card"><div class="ctitle">Plano alimentar</div>
    ${[['Meta diária',p.meta+' kcal'],['Déficit',def+' kcal/dia'],['Perda estimada','~'+kgSem+' kg/semana'],['Peso alvo','~'+alvo+' kg (−15%)'],['Prazo estimado','~'+sems+' semanas']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
    <div class="tip">💡 Seus dados ficam salvos na nuvem. Acesse de qualquer dispositivo.</div>
  </div>`;
}
window.abrirEdicaoPerfil=()=>{
  const p=perfil;
  const ov=document.createElement('div');ov.className='moverlay';ov.id='pedit-ov';
  ov.onclick=e=>{if(e.target===ov)fecharEdicao();};
  ov.innerHTML=`<div class="modal">
    <div class="mt">Editar Perfil</div>
    <div class="ms">Dados atualizados recalculam sua meta automaticamente</div>
    <label>Nome</label><input class="inp" id="ep-nome" value="${p.nome}" style="margin-bottom:12px">
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Peso (kg)</label><input class="inp" id="ep-peso" type="number" inputmode="decimal" value="${p.peso}"></div>
      <div style="flex:1"><label>Altura (cm)</label><input class="inp" id="ep-alt" type="number" inputmode="decimal" value="${p.alt||170}"></div>
    </div>
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Idade</label><input class="inp" id="ep-idade" type="number" inputmode="decimal" value="${p.idade}"></div>
      <div style="flex:1"><label>Sexo</label><select class="inp" id="ep-sexo"><option value="M" ${p.sexo==='M'?'selected':''}>Masculino</option><option value="F" ${p.sexo==='F'?'selected':''}>Feminino</option></select></div>
    </div>
    <label>Meta calórica diária (kcal)</label>
    <input class="inp" id="ep-meta" type="number" inputmode="decimal" value="${p.meta}" style="margin-bottom:6px">
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Deixe 0 para calcular automaticamente (déficit de 500 kcal)</div>
    <button class="bta" onclick="salvarPerfil()">Salvar</button>
    <button onclick="fecharEdicao()" style="background:none;border:none;color:var(--text3);font-size:13px;width:100%;padding:12px;cursor:pointer;margin-top:4px">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
};
window.fecharEdicao=()=>{const o=document.getElementById('pedit-ov');if(o)o.remove();};
window.salvarPerfil=async()=>{
  const nome=document.getElementById('ep-nome').value.trim();
  const peso=parseFloat(document.getElementById('ep-peso').value);
  const alt=parseFloat(document.getElementById('ep-alt').value);
  const idade=parseInt(document.getElementById('ep-idade').value);
  const sexo=document.getElementById('ep-sexo').value;
  const metaInput=parseInt(document.getElementById('ep-meta').value);
  if(!nome||!peso||!alt||!idade){toast('Preencha todos os campos');return;}
  const novo={...perfil,nome,peso,alt,idade,sexo};
  novo.tmb=calcTMB(novo);
  novo.meta=metaInput&&metaInput>0?metaInput:Math.round(novo.tmb-500);
  novo.ini=nome.substring(0,2).toUpperCase();
  perfil=novo;
  fecharEdicao();updHeader();
  await savePerfilCloud(currentUser.uid,perfil);
  toast('✓ Perfil atualizado!');render();
};

document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
</script>
