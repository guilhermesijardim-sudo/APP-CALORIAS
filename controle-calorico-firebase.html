<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calorias">
<meta name="theme-color" content="#dde8f5">
<title>Controle Calórico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#dde8f5;color:#1a2a3a;font-family:Arial,Helvetica,sans-serif;overflow:hidden;font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#c8d8ea}::-webkit-scrollbar-thumb{background:#8aaac8;border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
:root{--acc:#1a6fb5;--acc-bg:#1a6fb520;--acc-br:#1a6fb560;--bg:#dde8f5;--bg2:#eaf2fb;--bg3:#d0e0f0;--border:#b0c8e0;--text:#1a2a3a;--text2:#3a5570;--text3:#6a8aaa;--card:#eaf2fb;--nav:#d5e5f5;--header:#c8daf0;--water:#2196f3;--water-bg:#2196f315;--water-br:#2196f360}
body.jessica{--acc:#1a7ab5;--acc-bg:#1a7ab520;--acc-br:#1a7ab560}

#loading{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300}
.load-greeting{font-size:22px;font-weight:700;color:var(--acc);margin-bottom:4px;text-align:center}
.load-sub{font-size:13px;color:var(--text3);text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.lspn{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}

#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:200}
.login-logo{font-size:28px;font-weight:700;color:var(--acc);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center}
.login-card{background:white;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(26,111,181,.1)}
.login-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center}
.login-tabs{display:flex;margin-bottom:18px;background:var(--bg3);border-radius:8px;padding:3px}
.ltab{flex:1;background:none;border:none;padding:9px;font-size:14px;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .2s}
.ltab.active{background:white;color:var(--acc);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.finp{background:#f5f8fc;border:1.5px solid var(--border);border-radius:8px;padding:13px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s;margin-bottom:10px}
.finp:focus{border-color:var(--acc)}
.finp::placeholder{color:var(--text3)}
.fbta{background:var(--acc);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s;margin-top:4px}
.fbta:active{filter:brightness(.9)}
.ferr{font-size:13px;color:#e05050;text-align:center;min-height:18px;margin-bottom:8px}
.flink{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-align:center;width:100%;margin-top:12px}

#onboard-screen{position:fixed;inset:0;background:linear-gradient(135deg,#c8daf0 0%,#dde8f5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:150;overflow-y:auto}
.onboard-card{background:white;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(26,111,181,.1)}
.onboard-title{font-size:20px;font-weight:700;color:var(--acc);margin-bottom:6px;text-align:center}
.onboard-sub{font-size:13px;color:var(--text3);margin-bottom:20px;text-align:center}

.profile-bar{display:flex;background:var(--header);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.pbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:13px;border-bottom:2px solid transparent;transition:all .25s}
.pbtn .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg3);border:2px solid var(--border);transition:all .25s;flex-shrink:0}
.pbtn.au1{color:#b07010;border-bottom-color:#c8901a}
.pbtn.au1 .av{background:#c8901a20;border-color:#c8901a;color:#b07010}
.pbtn.au2{color:#1a6fb5;border-bottom-color:#1a6fb5}
.pbtn.au2 .av{background:#1a6fb520;border-color:#1a6fb5;color:#1a6fb5}

.header{background:var(--header);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.htitle{font-size:19px;font-weight:700;color:var(--acc)}
.hsub{font-size:12px;color:var(--text3);margin-top:2px}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--text3);font-size:12px;padding:5px 10px;cursor:pointer}

.nav{display:flex;background:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0}
.nbtn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:11px 4px;font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.nbtn.active{color:var(--acc);border-bottom-color:var(--acc)}

.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom))}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,111,181,.06)}
.ctitle{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}

/* HOJE - dois aneis lado a lado */
.rings-row{display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:12px}
.ring-block{display:flex;flex-direction:column;align-items:center;flex:1}
.rw{position:relative;width:130px;height:130px}
.rw.small{width:110px;height:110px}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rn{font-size:26px;font-weight:700;line-height:1}
.rn.small{font-size:20px}
.rl{font-size:11px;color:var(--text3);margin-top:3px;text-align:center}
.sr{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid var(--border)}
.sv{font-size:16px;font-weight:700;text-align:center}
.sl{font-size:11px;color:var(--text3);margin-top:3px;text-align:center}

.rfh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rfn{font-size:15px;font-weight:700;color:var(--acc)}
.rfc{font-size:13px;color:var(--text2)}
.ir{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3)}
.ir:last-child{border-bottom:none}
.in{font-size:14px;line-height:1.4;max-width:185px;color:var(--text)}
.ib{font-size:12px;color:var(--text3);margin-top:2px}
.iright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ical{font-size:14px;font-weight:700;color:var(--acc)}
.iedit{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 5px}
.rmb{background:none;border:none;color:#cc4444;cursor:pointer;font-size:18px;padding:3px 5px;line-height:1}

/* ÁGUA */
.water-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.wbtn{background:var(--water-bg);border:1.5px solid var(--water-br);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--water);cursor:pointer;transition:all .2s}
.wbtn:active{background:#2196f330}
.water-bar-wrap{height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;margin:10px 0 6px}
.water-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,#42a5f5,#1565c0);transition:width .5s ease}

.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:white;border:1.5px solid var(--border);border-radius:7px;padding:7px 13px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--text2)}
.tag.sel{background:var(--acc-bg);border-color:var(--acc);color:var(--acc);font-weight:700}
.inp{background:white;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);width:100%;font-size:15px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--text3)}
select.inp{cursor:pointer}
.bta{background:var(--acc);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;cursor:pointer;transition:all .2s}
.bta:active{filter:brightness(.9)}
.bta.secondary{background:white;color:var(--acc);border:1.5px solid var(--acc-br)}
.btl{background:none;border:none;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;padding:0}
.sres{margin-top:12px;max-height:240px;overflow-y:auto}
.fi{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:white;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;margin-bottom:6px;transition:all .15s;gap:10px}
.fi:active{background:var(--bg3)}
.fin{flex:1;min-width:0}
.fin-n{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.fin-b{font-size:12px;color:var(--text3);margin-top:2px}
.fic{font-size:13px;font-weight:700;color:var(--acc);flex-shrink:0}
.lding{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.spn{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
.cform{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.r2{display:flex;gap:8px}
.hbw{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px}
.hb{height:100%;border-radius:4px;transition:width .7s ease}
.hrow{margin-bottom:16px}
.hh{display:flex;justify-content:space-between;font-size:13px}
.inr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3);font-size:14px}
.inr:last-child{border-bottom:none}
.inl{color:var(--text2)}
.tip{margin-top:12px;padding:12px;background:var(--acc-bg);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;font-size:13px;color:var(--text2);line-height:1.6}
.empty{text-align:center;padding:40px 20px}
.ei{font-size:42px;margin-bottom:12px}
.et{font-size:15px;margin-bottom:18px;color:var(--text2)}
#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--acc);color:white;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 12px rgba(26,111,181,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.moverlay{position:fixed;inset:0;background:#000a;display:flex;align-items:flex-end;z-index:100}
.modal{background:white;border:1px solid var(--border);border-top:3px solid var(--acc);border-radius:18px 18px 0 0;padding:22px;padding-bottom:max(22px,env(safe-area-inset-bottom));width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(26,111,181,.15)}
.mt{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.ms{font-size:13px;color:var(--text3);margin-bottom:16px}
@keyframes mIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{animation:mIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:sIn .22s ease}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2ab55a;display:inline-block;margin-left:5px;vertical-align:middle}
.sync-dot.syncing{background:#e8a020;animation:pulse 1s infinite}
.sync-dot.offline{background:#e04040}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.src-badge{font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;color:var(--text3);margin-left:5px;vertical-align:middle}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600}
/* IA box */
.ai-box{background:linear-gradient(135deg,#e8f4ff,#f0f8ff);border:1.5px solid #90caf9;border-radius:10px;padding:14px;margin-bottom:10px}
.ai-box-title{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:8px}
.ai-result{background:white;border:1px solid #90caf9;border-radius:8px;padding:10px;margin-top:10px;font-size:13px;color:var(--text2);line-height:1.5;display:none}
</style>
</head>
<body>

<div id="loading">
  <div class="lspn"></div>
  <div class="load-greeting" id="load-greeting"></div>
  <div class="load-sub" id="load-msg">Carregando seus dados...</div>
</div>

<div id="login-screen" style="display:none">
  <div class="login-logo">🥗 Controle Calórico</div>
  <div class="login-sub">☁️ Sincronizado com a nuvem</div>
  <div class="login-card">
    <div class="login-title" id="login-title">Entrar</div>
    <div class="login-tabs">
      <button class="ltab active" onclick="setLoginTab('login')">Entrar</button>
      <button class="ltab" onclick="setLoginTab('register')">Criar conta</button>
    </div>
    <div class="ferr" id="ferr"></div>
    <input class="finp" id="f-email" type="email" placeholder="E-mail" autocomplete="email">
    <input class="finp" id="f-pass" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="fbta" id="f-btn" onclick="doAuth()">Entrar</button>
    <button class="flink" onclick="doReset()">Esqueci a senha</button>
  </div>
</div>

<div id="onboard-screen" style="display:none">
  <div class="onboard-card">
    <div style="text-align:center;font-size:36px;margin-bottom:12px">👋</div>
    <div class="onboard-title">Bem-vindo!</div>
    <div class="onboard-sub">Configure seu plano calórico personalizado</div>
    <label>Seu nome</label>
    <input class="inp" id="ob-nome" placeholder="Como prefere ser chamado?" style="margin-bottom:12px">
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Peso (kg)</label><input class="inp" id="ob-peso" type="number" inputmode="decimal" placeholder="Ex: 75" oninput="prevMeta()"></div>
      <div style="flex:1"><label>Altura (cm)</label><input class="inp" id="ob-alt" type="number" inputmode="decimal" placeholder="Ex: 170" oninput="prevMeta()"></div>
    </div>
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Idade</label><input class="inp" id="ob-idade" type="number" inputmode="decimal" placeholder="Ex: 30" oninput="prevMeta()"></div>
      <div style="flex:1"><label>Sexo</label><select class="inp" id="ob-sexo" onchange="prevMeta()"><option value="M">Masculino</option><option value="F">Feminino</option></select></div>
    </div>
    <label>Nível de atividade</label>
    <select class="inp" id="ob-atv" style="margin-bottom:14px" onchange="prevMeta()">
      <option value="1.2">Sedentário (sem exercícios)</option>
      <option value="1.375">Leve (1-3x por semana)</option>
      <option value="1.55">Moderado (3-5x por semana)</option>
      <option value="1.725">Intenso (6-7x por semana)</option>
    </select>
    <div id="ob-preview" style="background:var(--acc-bg);border:1.5px solid var(--acc-br);border-radius:10px;padding:12px;margin-bottom:14px;display:none;text-align:center">
      <div style="font-size:11px;color:var(--text3);font-weight:700;margin-bottom:4px">SUA META ESTIMADA</div>
      <div id="ob-meta-val" style="font-size:26px;font-weight:700;color:var(--acc)"></div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">kcal/dia · Meta de água: <span id="ob-agua-val"></span> ml/dia</div>
    </div>
    <button class="bta" onclick="salvarOnboarding()">Começar! 🚀</button>
    <div class="ferr" id="ob-err" style="margin-top:8px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="profile-bar" id="pbar"></div>
  <div class="header">
    <div><div class="htitle" id="htitle"></div><div class="hsub" id="hsub"></div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div style="font-size:12px;color:var(--text3)" id="hdate"></div>
      <div style="display:flex;align-items:center;gap:5px">
        <span id="sync-status" class="sync-dot"></span>
        <button class="logout-btn" onclick="doLogout()">Sair</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nbtn active" onclick="setAba('hoje')">Hoje</button>
    <button class="nbtn" onclick="setAba('add')">+ Add</button>
    <button class="nbtn" onclick="setAba('hist')">Histórico</button>
    <button class="nbtn" onclick="setAba('perfil')">Perfil</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,sendPasswordResetEmail}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,collection,getDocs,deleteDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyCCmROrCWOGahUI4cbniTy22iu_i0EGbsE",authDomain:"app-calorias-e63f8.firebaseapp.com",projectId:"app-calorias-e63f8",storageBucket:"app-calorias-e63f8.firebasestorage.app",messagingSenderId:"267012340278",appId:"1:267012340278:web:abb05ec42a58f2e302f697"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);

// ── SAUDAÇÃO ─────────────────────────────────────────────
function saudacao(){const h=new Date().getHours();if(h>=5&&h<12)return'Bom dia ☀️';if(h>=12&&h<19)return'Boa tarde 🌤️';return'Boa noite 🌙';}
document.getElementById('load-greeting').textContent=saudacao();

// ── BANCO DE ALIMENTOS ───────────────────────────────────
const TACO=[
  {n:'Arroz branco cozido',c:128,g:'Cereais'},{n:'Arroz integral cozido',c:124,g:'Cereais'},
  {n:'Macarrão cozido',c:131,g:'Cereais'},{n:'Pão francês',c:274,g:'Cereais'},
  {n:'Pão de forma branco',c:267,g:'Cereais'},{n:'Pão de forma integral',c:253,g:'Cereais'},
  {n:'Pão de queijo',c:305,g:'Cereais'},{n:'Aveia em flocos',c:369,g:'Cereais'},
  {n:'Tapioca seca',c:354,g:'Cereais'},{n:'Tapioca hidratada',c:149,g:'Cereais'},
  {n:'Cuscuz de milho cozido',c:100,g:'Cereais'},{n:'Fubá cozido',c:58,g:'Cereais'},
  {n:'Feijão preto cozido',c:77,g:'Leguminosas'},{n:'Feijão carioca cozido',c:76,g:'Leguminosas'},
  {n:'Lentilha cozida',c:93,g:'Leguminosas'},{n:'Grão de bico cozido',c:129,g:'Leguminosas'},
  {n:'Ervilha cozida',c:70,g:'Leguminosas'},
  {n:'Costela bovina assada',c:302,g:'Carnes'},{n:'Cupim bovino assado',c:318,g:'Carnes'},
  {n:'Patinho bovino grelhado',c:219,g:'Carnes'},{n:'Alcatra grelhada',c:218,g:'Carnes'},
  {n:'Fraldinha grelhada',c:246,g:'Carnes'},{n:'Filé mignon grelhado',c:219,g:'Carnes'},
  {n:'Contrafilé grelhado',c:263,g:'Carnes'},{n:'Picanha grelhada',c:279,g:'Carnes'},
  {n:'Maminha grelhada',c:215,g:'Carnes'},{n:'Coxão mole grelhado',c:213,g:'Carnes'},
  {n:'Carne moída refogada',c:219,g:'Carnes'},{n:'Hambúrguer bovino grelhado',c:243,g:'Carnes'},
  {n:'Lombo suíno assado',c:218,g:'Carnes'},{n:'Costela suína assada',c:290,g:'Carnes'},
  {n:'Bacon frito',c:541,g:'Carnes'},{n:'Linguiça calabresa grelhada',c:260,g:'Carnes'},
  {n:'Torresmo frito',c:544,g:'Carnes'},
  {n:'Frango peito grelhado',c:163,g:'Aves'},{n:'Frango peito assado',c:159,g:'Aves'},

function hoje(){return new Date().toISOString().split('T')[0];}
function setSS(s){const d=document.getElementById('sync-status');if(!d)return;d.className='sync-dot'+(s==='syncing'?' syncing':s==='offline'?' offline':'');}
function calcTMB(p){const a=parseFloat(p.atv||1.2);const b=p.sexo==='M'?(10*p.peso+6.25*(p.alt||170)-5*(p.idade||25)+5):(10*p.peso+6.25*(p.alt||170)-5*(p.idade||25)-161);return Math.round(b*a);}
function calcMetaAgua(p){return Math.round((p.peso||70)*35/100)*100;} // 35ml/kg arredondado p/100

async function saveDay(uid,date,items){
  setSS('syncing');
  try{await setDoc(doc(db,'users',uid,'dias',date),{items,updatedAt:Date.now()});cachedDays[date]=items;setSS('ok');}
  catch{setSS('offline');const fb=JSON.parse(localStorage.getItem('cc_'+uid)||'{}');fb[date]=items;localStorage.setItem('cc_'+uid,JSON.stringify(fb));}
}
async function saveAgua(uid,date,ml){
  try{await setDoc(doc(db,'users',uid,'agua',date),{ml,updatedAt:Date.now()});cachedAgua[date]=ml;}
  catch{const fb=JSON.parse(localStorage.getItem('ccw_'+uid)||'{}');fb[date]=ml;localStorage.setItem('ccw_'+uid,JSON.stringify(fb));}
}
async function loadAllDays(uid){
  try{
    const snap=await getDocs(collection(db,'users',uid,'dias'));
    const days={};snap.forEach(d=>{days[d.id]=d.data().items||[];});
    ['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid].forEach(k=>{try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d]&&fb[d]&&fb[d].length)days[d]=fb[d];});}catch{}});
    // MIGRAÇÃO: mescla chave "hoje" com data real
    const hj=hoje();
    if(days['hoje']&&days['hoje'].length){
      days[hj]=[...(days[hj]||[]),...days['hoje']];
      delete days['hoje'];
      try{await deleteDoc(doc(db,'users',uid,'dias','hoje'));}catch{}
    }
    // Deduplica por id
    Object.keys(days).forEach(d=>{const s=new Set();days[d]=(days[d]||[]).filter(x=>{if(s.has(x.id))return false;s.add(x.id);return true;});});
    cachedDays=days;localStorage.setItem('cc_'+uid,JSON.stringify(days));setSS('ok');
  }catch{
    const days={};['cc_'+uid,'cc_fb_'+uid,'cc4_'+uid].forEach(k=>{try{const fb=JSON.parse(localStorage.getItem(k)||'{}');Object.keys(fb).forEach(d=>{if(!days[d])days[d]=fb[d];});}catch{}});
    cachedDays=days;setSS('offline');
  }
}
async function loadAgua(uid){
  try{const snap=await getDocs(collection(db,'users',uid,'agua'));snap.forEach(d=>{cachedAgua[d.id]=d.data().ml||0;});}
  catch{try{cachedAgua=JSON.parse(localStorage.getItem('ccw_'+uid)||'{}');}catch{}}
}
async function savePerfilCloud(uid,p){try{await setDoc(doc(db,'users',uid,'config','perfil'),p);}catch{localStorage.setItem('cc_perf_'+uid,JSON.stringify(p));}}
async function loadPerfilCloud(uid){try{const d=await getDoc(doc(db,'users',uid,'config','perfil'));return d.exists()?d.data():null;}catch{const s=localStorage.getItem('cc_perf_'+uid);return s?JSON.parse(s):null;}}
async function saveColab(item){try{const ref=doc(db,'global','alimentos_colaborativos');const d=await getDoc(ref);const lista=d.exists()?(d.data().lista||[]):[];if(!lista.find(x=>x.n===item.n)){lista.push(item);await setDoc(ref,{lista});}BASE_COLAB=lista;}catch{}}

window.prevMeta=()=>{
  const peso=parseFloat(document.getElementById('ob-peso').value);
  const alt=parseFloat(document.getElementById('ob-alt').value);
  const idade=parseInt(document.getElementById('ob-idade').value);
  const sexo=document.getElementById('ob-sexo').value;
  const atv=parseFloat(document.getElementById('ob-atv').value);
  if(peso&&alt&&idade){
    const bmr=sexo==='M'?(10*peso+6.25*alt-5*idade+5):(10*peso+6.25*alt-5*idade-161);
    const meta=Math.max(Math.round(bmr*atv)-500,1200);
    const agua=Math.round(peso*35/100)*100;
    document.getElementById('ob-meta-val').textContent=meta+' kcal/dia';
    document.getElementById('ob-agua-val').textContent=agua;
    document.getElementById('ob-preview').style.display='block';
  }
};
window.salvarOnboarding=async()=>{
  const nome=document.getElementById('ob-nome').value.trim();
  const peso=parseFloat(document.getElementById('ob-peso').value);
  const alt=parseFloat(document.getElementById('ob-alt').value);
  const idade=parseInt(document.getElementById('ob-idade').value);
  const sexo=document.getElementById('ob-sexo').value;
  const atv=parseFloat(document.getElementById('ob-atv').value);
  if(!nome||!peso||!alt||!idade){document.getElementById('ob-err').textContent='Preencha todos os campos';return;}
  const bmr=sexo==='M'?(10*peso+6.25*alt-5*idade+5):(10*peso+6.25*alt-5*idade-161);
  const tmb=Math.round(bmr*atv);
  perfil={nome,ini:nome.substring(0,2).toUpperCase(),peso,alt,idade,sexo,atv,tmb,meta:Math.max(tmb-500,1200),metaAgua:Math.round(peso*35/100)*100,cor:'gold',theme:'gold'};
  await savePerfilCloud(currentUser.uid,perfil);
  document.getElementById('onboard-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  updHeader();render();toast('✓ Bem-vindo, '+nome+'! 🎉');
};

onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById('load-msg').textContent='Carregando seus dados...';
    document.getElementById('loading').style.display='flex';
    const savedPerfil=await loadPerfilCloud(user.uid);
    const fixo=getPerfilFixo(user.email);
    if(fixo){perfil={...fixo,metaAgua:calcMetaAgua(fixo),...(savedPerfil&&{meta:savedPerfil.meta,metaAgua:savedPerfil.metaAgua||calcMetaAgua(fixo)})};}
    else if(savedPerfil){perfil=savedPerfil;if(!perfil.metaAgua)perfil.metaAgua=calcMetaAgua(perfil);}
    else{document.getElementById('loading').style.display='none';document.getElementById('login-screen').style.display='none';document.getElementById('onboard-screen').style.display='flex';await Promise.all([loadAllDays(user.uid),loadAgua(user.uid),loadColab()]);return;}
    document.body.classList.toggle('jessica',perfil.theme==='blue'||isJessica(user.email));
    document.getElementById('login-screen').style.display='none';
    document.getElementById('onboard-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    updHeader();
    await Promise.all([loadAllDays(user.uid),loadAgua(user.uid),loadColab()]);
    document.getElementById('loading').style.display='none';
    render();
  }else{
    currentUser=null;cachedDays={};cachedAgua={};perfil=null;
    document.getElementById('loading').style.display='none';
    document.getElementById('onboard-screen').style.display='none';
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
});

function rHoje(w){
  const d=hoje(),items=getDia(d),total=items.reduce((s,x)=>s+x.cal,0);
  const pct=Math.min(total/perfil.meta*100,100),rest=perfil.meta-total;
  const corCal=pct<70?'#1a9a50':pct<90?'#c87800':pct<100?'#c85000':'#c03030';
  const aguaHoje=getAgua(d),metaAgua=perfil.metaAgua||2000;
  const pctAgua=Math.min(aguaHoje/metaAgua*100,100);
  const corAgua=pctAgua<50?'#f44336':pctAgua<80?'#ff9800':'#2196f3';
  const C=2*Math.PI*55,Ca=2*Math.PI*44;

  w.innerHTML+=`<div class="card">
    <div class="rings-row">
      <div class="ring-block">
        <div class="rw"><svg width="130" height="130" style="transform:rotate(-90deg)">
          <circle cx="65" cy="65" r="55" fill="none" stroke="#d0e0f0" stroke-width="9"/>
          <circle cx="65" cy="65" r="55" fill="none" stroke="${corCal}" stroke-width="9"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C*(1-pct/100)).toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dashoffset .6s,stroke .4s"/>
        </svg>
        <div class="rc"><div class="rn" style="color:${corCal}">${total}</div><div class="rl">kcal hoje</div></div></div>
        <div style="font-size:11px;color:${rest>=0?'#1a7a40':'#c03030'};font-weight:600;text-align:center;margin-top:4px">
          ${rest>=0?rest+' restantes':'+'+ Math.abs(rest)+' excedido'}
        </div>
      </div>
      <div style="width:1px;background:var(--border);align-self:stretch"></div>
      <div class="ring-block">
        <div class="rw small"><svg width="110" height="110" style="transform:rotate(-90deg)">
          <circle cx="55" cy="55" r="44" fill="none" stroke="#d0e0f0" stroke-width="8"/>
          <circle cx="55" cy="55" r="44" fill="none" stroke="${corAgua}" stroke-width="8"
            stroke-dasharray="${Ca.toFixed(1)}" stroke-dashoffset="${(Ca*(1-pctAgua/100)).toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dashoffset .5s,stroke .3s"/>
        </svg>
        <div class="rc"><div class="rn small" style="color:${corAgua}">${aguaHoje>=1000?(aguaHoje/1000).toFixed(1)+'L':aguaHoje+'ml'}</div><div class="rl">água hoje</div></div></div>
        <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">${Math.max(0,metaAgua-aguaHoje)}ml restam</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center">
          <button class="wbtn" onclick="addAgua(200)">+200ml</button>
          <button class="wbtn" onclick="addAgua(350)">+350ml</button>
          <button class="wbtn" onclick="addAgua(500)">+500ml</button>
        </div>
      </div>
    </div>
    <div class="sr">
      <div><div class="sv">${perfil.meta}</div><div class="sl">Meta kcal</div></div>
      <div><div class="sv">${total}</div><div class="sl">Consumido</div></div>
      <div><div class="sv" style="color:${corAgua}">${Math.round(pctAgua)}%</div><div class="sl">Hidratação</div></div>
    </div>
  </div>`;

  if(!items.length){
    w.innerHTML+=`<div class="empty"><div class="ei">🥗</div><div class="et">Nenhum alimento registrado hoje</div>
      <button class="bta" style="width:auto;padding:12px 28px" onclick="setAba('add')">+ Adicionar alimento</button></div>`;
  }else{
    REFS.forEach(ref=>{
      const ri=items.filter(x=>x.refeicao===ref);if(!ri.length)return;
      const sub=ri.reduce((s,x)=>s+x.cal,0);

window.abrirEdicaoItem=(date,id)=>{

function abrirModalEdicao(date,id,item,cal100){
  const ov=document.createElement('div');ov.className='moverlay';ov.id='iedit-ov';
  ov.onclick=e=>{if(e.target===ov)fecharEdicaoItem();};

    <label>Quantidade (g ou ml)</label>
    <input class="inp" id="ei-qtd" type="number" inputmode="decimal" value="${parseFloat(item.qtd)||''}" style="margin-bottom:8px;font-size:18px;padding:14px">

// ── IA ESTIMATIVA ────────────────────────────────────────
window.estimarIA=async()=>{
  const desc=document.getElementById('ai-inp').value.trim();
  if(!desc){toast('Descreva o que comeu');return;}
  const btn=document.getElementById('ai-btn');
  const res=document.getElementById('ai-result');
  btn.textContent='Estimando...';btn.disabled=true;
  res.style.display='none';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:`Você é um nutricionista brasileiro. O usuário comeu: "${desc}". 
Estime as calorias de cada item e o total. Responda APENAS em JSON neste formato exato, sem markdown:
{"itens":[{"nome":"Nome do alimento","quantidade":"ex: 200g","cal":250}],"total":450,"obs":"observação curta opcional"}
Use valores realistas da tabela TACO brasileira. Seja conservador nas estimativas.`}]
      })
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'{}';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.itens&&parsed.total){
      const itensHTML=parsed.itens.map(it=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e0eef8">
          <span>${it.nome} <span style="color:#90a4ae;font-size:12px">(${it.quantidade||'estimado'})</span></span>
          <span style="font-weight:700;color:var(--acc)">${it.cal} kcal</span>
        </div>`).join('');
      res.innerHTML=`${itensHTML}
        <div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:15px">
          <span>Total estimado</span><span style="color:var(--acc)">${parsed.total} kcal</span>
        </div>
        ${parsed.obs?`<div style="font-size:12px;color:#90a4ae;margin-top:4px">💡 ${parsed.obs}</div>`:''}
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="bta" onclick="addIAItens(${JSON.stringify(parsed.itens).replace(/'/g,'&apos;')},${parsed.total})" style="padding:10px">Adicionar tudo (${parsed.total} kcal)</button>
        </div>`;
      res.style.display='block';
    }
  }catch(e){res.innerHTML=`<div style="color:#e05050">Erro ao estimar. Tente novamente.</div>`;res.style.display='block';}
  btn.textContent='Estimar com IA ✨';btn.disabled=false;
};

function showPop(){const r=document.getElementById('sres');if(!r)return;r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:700">MAIS BUSCADOS</div>`+getBase().slice(0,10).map(a=>fiHTML(a)).join('');}
function fiHTML(a){
  const n=a.n||(a.product_name_pt||a.product_name||'Produto');
  const m=a.m||(a.brands||'');
  const c=a.c||(a.nutriments?Math.round(a.nutriments['energy-kcal_100g']||0):0);
  const src=a.src||(a.code?'OFF':'');
  return `<div class="fi" onclick="openQtd('${esc(n)}','${esc(m)}',${c})">
    <div class="fin"><div class="fin-n">${n}${src?`<span class="src-badge">${src}</span>`:''}</div>${m?`<div class="fin-b">${m}</div>`:''}</div>
    <div class="fic">${c} kcal/100g</div>
  </div>`;
}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

window.onSrch=async(v)=>{
  clearTimeout(stimer);const r=document.getElementById('sres');if(!r)return;
  if(!v||v.length<2){showPop();return;}
  const q=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const loc=getBase().filter(a=>{const nome=(a.n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');const marca=(a.m||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return nome.includes(q)||marca.includes(q);}).slice(0,15);
  if(loc.length)r.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:700">BASE LOCAL</div>`+loc.map(a=>fiHTML(a)).join('');
  if(v.length<3)return;
  stimer=setTimeout(async()=>{
    try{
      const isBC=/^\d{8,14}$/.test(v.replace(/\s/g,''));
      const url=isBC?`https://world.openfoodfacts.org/api/v0/product/${v.replace(/\s/g,'')}.json`:`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(v)}&search_simple=1&action=process&json=1&fields=code,product_name,product_name_pt,brands,nutriments&page_size=10`;
      const res=await fetch(url,{signal:AbortSignal.timeout(6000)});
      const data=await res.json();
      let prods=[];
      if(isBC){if(data.status===1&&data.product)prods=[data.product];}
      else prods=(data.products||[]).filter(p=>{const k=p.nutriments&&p.nutriments['energy-kcal_100g'];return k&&k>0&&(p.product_name_pt||p.product_name);});
      if(prods.length)r.innerHTML=(loc.length?r.innerHTML:'')+`<div style="font-size:12px;color:var(--text3);margin:${loc.length?10:0}px 0 8px;font-weight:700">OPEN FOOD FACTS</div>`+prods.map(p=>fiHTML({n:p.product_name_pt||p.product_name,m:p.brands,c:Math.round(p.nutriments['energy-kcal_100g']),src:'OFF'})).join('');
      else if(!loc.length)r.innerHTML=`<div class="lding">Nenhum resultado. Adicione manualmente!</div>`;
    }catch{if(!loc.length)r.innerHTML=`<div class="lding">Sem conexão. Adicione manualmente.</div>`;}
  },600);
};

// ── HISTÓRICO ────────────────────────────────────────────
function rHist(w){
  const hj=hoje();
  // Deduplica chaves
  const allKeys=[...new Set(Object.keys(cachedDays))].filter(k=>k!=='hoje').sort().reverse();
  const totalDias=allKeys.length,start=histPage*HIST_PAGE,pageKeys=allKeys.slice(start,start+HIST_PAGE);
  const hasPrev=histPage>0,hasNext=start+HIST_PAGE<totalDias;
  const totalCal=allKeys.reduce((s,d)=>s+(cachedDays[d]||[]).reduce((ss,x)=>ss+x.cal,0),0);
  const media=totalDias?Math.round(totalCal/totalDias):0;
  const ok=allKeys.filter(d=>{const t=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);return t>0&&t<=perfil.meta*1.1;});
  const rows=!pageKeys.length?`<div style="color:var(--text3);font-size:14px">Sem registros ainda</div>`
    :pageKeys.map(d=>{
      const dt=(cachedDays[d]||[]).reduce((s,x)=>s+x.cal,0);
      const pct=Math.min(dt/perfil.meta*100,100),cor=pct<90?'#1a9a50':pct<105?'#c87800':'#c03030';
      const aguaDia=cachedAgua[d]||0;
      const dateObj=new Date(d+'T12:00');
      const lbl=d===hj?'Hoje ⭐':dateObj.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short',year:dateObj.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
      const items=cachedDays[d]||[];
      const det=items.map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;color:var(--text2);border-bottom:1px solid var(--bg3)">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.nome}${x.qtd?' ('+x.qtd+')':''}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">
          <span style="font-weight:700;color:var(--acc)">${x.cal} kcal</span>
          <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px" onclick="abrirEdicaoItem('${d}',${x.id})">✏️</button>
          <button style="background:none;border:none;color:#cc4444;cursor:pointer;font-size:15px;padding:2px 4px" onclick="rmItemHist('${d}',${x.id})">×</button>
        </div>
      </div>`).join('');
      // Botão para adicionar alimento em dia anterior
      const addBtn=`<div style="margin-top:8px"><button onclick="abrirAddDiaAnterior('${d}')" style="background:var(--acc-bg);border:1.5px solid var(--acc-br);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--acc);cursor:pointer">+ Adicionar alimento neste dia</button>
      <button onclick="abrirEditAgua('${d}',${aguaDia})" style="background:var(--water-bg);border:1.5px solid var(--water-br);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--water);cursor:pointer;margin-left:6px">💧 ${aguaDia}ml</button></div>`;
      return `<div class="hrow"><div class="hh" style="cursor:pointer" onclick="togDetail('dd_${d}')">
        <span style="color:${d===hj?'var(--acc)':'var(--text)'};font-weight:${d===hj?'700':'500'}">${lbl}</span>
        <span style="color:${cor};font-weight:700;display:flex;align-items:center;gap:6px">${dt} / ${perfil.meta} <span style="font-size:12px;color:var(--text3)" id="arr_${d}">▸</span></span>
      </div><div class="hbw"><div class="hb" style="width:${pct}%;background:${cor}"></div></div>
      <div id="dd_${d}" style="display:none;margin-top:10px">${det||'<div style="font-size:13px;color:var(--text3);padding:5px 0">Sem itens</div>'}${addBtn}</div></div>`;
    }).join('');

  const fD=pageKeys.length?new Date(pageKeys[pageKeys.length-1]+'T12:00'):null;
  const lD=pageKeys.length?new Date(pageKeys[0]+'T12:00'):null;
  const pLabel=fD&&lD?(fD.getMonth()===lD.getMonth()&&fD.getFullYear()===lD.getFullYear()?fD.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):fD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})+' – '+lD.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})):'';

  w.innerHTML=`
  <div class="card" style="padding:0;overflow:hidden;display:flex">
    ${[['Total','de dias',totalDias],['Dentro','da meta',ok.length],['Média','kcal/dia',media]].map(([a,b,v],i)=>`
    <div style="flex:1;text-align:center;padding:16px 8px;${i<2?'border-right:1px solid var(--border)':''}">
      <div style="font-size:26px;font-weight:700;color:var(--acc)">${v}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${a}<br>${b}</div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="ctitle" style="margin-bottom:0">Registros${pLabel?' · '+pLabel:''}</div>
      <div style="font-size:12px;color:var(--text3)">${totalDias?start+1+'-'+Math.min(start+HIST_PAGE,totalDias)+' / '+totalDias:'0'}</div>
    </div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="histNav(-1)" style="flex:1;background:${hasPrev?'var(--bg3)':'var(--card)'};border:1.5px solid ${hasPrev?'var(--acc-br)':'var(--border)'};border-radius:9px;padding:12px;color:${hasPrev?'var(--acc)':'var(--text3)'};font-size:13px;font-weight:700;cursor:${hasPrev?'pointer':'default'}">← Recentes</button>
      <button onclick="histNav(1)" style="flex:1;background:${hasNext?'var(--bg3)':'var(--card)'};border:1.5px solid ${hasNext?'var(--acc-br)':'var(--border)'};border-radius:9px;padding:12px;color:${hasNext?'var(--acc)':'var(--text3)'};font-size:13px;font-weight:700;cursor:${hasNext?'pointer':'default'}">Antigos →</button>
    </div>
  </div>`;
}

window.salvarAddHist=async(date)=>{
  const nome=document.getElementById('ah-nome').value.trim();
  const cal=parseInt(document.getElementById('ah-cal').value);
  const qtd=document.getElementById('ah-qtd').value.trim();
  if(!nome||!cal){toast('Preencha nome e calorias');return;}
  const items=[...(cachedDays[date]||[]),{id:Date.now(),nome,cal,qtd,marca:'',refeicao:refHistSel,hora:'(editado)'}];
  cachedDays[date]=items;
  await saveDay(currentUser.uid,date,items);
  fecharAddHist();toast('✓ Adicionado!');render();
};

// ── EDITAR ÁGUA ──────────────────────────────────────────
window.abrirEditAgua=(date,atual)=>{
  const ov=document.createElement('div');ov.className='moverlay';ov.id='agua-ov';
  ov.onclick=e=>{if(e.target===ov)fecharEditAgua();};
  const dateLabel=date===hoje()?'hoje':new Date(date+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'});
  ov.innerHTML=`<div class="modal">
    <div class="mt">💧 Água — ${dateLabel}</div>
    <div class="ms">Total atual: ${atual} ml</div>
    <label>Adicionar</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      ${[200,350,500,750,1000].map(v=>`<button class="wbtn" onclick="addAguaData('${date}',${v})")+${v}ml</button>`).join('')}
    </div>
    <label>Ou defina o total diário</label>
    <input class="inp" id="agua-total" type="number" inputmode="decimal" placeholder="Total em ml" style="margin-bottom:14px" value="${atual}">
    <button class="bta" onclick="setAguaData('${date}')">Definir total</button>
    <button onclick="fecharEditAgua()" style="background:none;border:none;color:var(--text3);font-size:14px;width:100%;padding:12px;cursor:pointer;margin-top:4px">Fechar</button>
  </div>`;
  document.body.appendChild(ov);
};
window.fecharEditAgua=()=>{const o=document.getElementById('agua-ov');if(o)o.remove();};
window.addAguaData=async(date,ml)=>{await addAguaDia(date,ml);fecharEditAgua();toast(`✓ +${ml}ml registrado!`);};
window.setAguaData=async(date)=>{
  const v=parseInt(document.getElementById('agua-total').value);
  if(!v&&v!==0){toast('Informe o valor');return;}
  await setAguaDia(date,v);fecharEditAgua();toast('✓ Água atualizada!');
};

// ── PERFIL ───────────────────────────────────────────────
function rPerfil(w){
  const p=perfil;
  const imc=(p.peso/Math.pow((p.alt||170)/100,2)).toFixed(1);
  const cls=imc<25?'Peso normal':imc<30?'Sobrepeso':imc<35?'Obesidade grau I':'Obesidade grau II';
  const tmb=calcTMB(p),def=Math.round(tmb-p.meta);
  const kgSem=(def/7700*7).toFixed(2),alvo=Math.round(p.peso*0.85);
  const sems=Math.round((p.peso-alvo)/Math.max(parseFloat(kgSem),0.01));
  w.innerHTML=`
  <div class="card" style="text-align:center;padding:22px">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--acc-bg);border:2px solid var(--acc-br);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;font-weight:700;color:var(--acc)">${p.ini||'?'}</div>
    <div style="font-size:20px;font-weight:700">${p.nome}</div>
    <div style="font-size:13px;color:var(--text3);margin-top:5px">${p.idade} anos · ${p.sexo==='M'?'Masculino':'Feminino'}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:3px">${currentUser?.email}</div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="ctitle" style="margin-bottom:0">Dados físicos</div>
      <button class="btl" onclick="abrirEdicaoPerfil()">✏️ Editar</button>
    </div>
    ${[['Peso',p.peso+' kg'],['Altura',(p.alt||'—')+' cm'],['IMC',imc+' · '+cls],['TDEE estimado','~'+tmb+' kcal/dia'],['Meta de água',p.metaAgua+' ml/dia']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
  </div>
  <div class="card"><div class="ctitle">Plano alimentar</div>
    ${[['Meta diária',p.meta+' kcal'],['Déficit',def+' kcal/dia'],['Perda estimada','~'+kgSem+' kg/semana'],['Peso alvo','~'+alvo+' kg (−15%)'],['Prazo estimado','~'+sems+' semanas']].map(([l,v])=>`<div class="inr"><span class="inl">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
    <div class="tip">💡 Dados salvos na nuvem. Acesse de qualquer dispositivo.</div>
  </div>`;
}
window.abrirEdicaoPerfil=()=>{
  const p=perfil;
  const ov=document.createElement('div');ov.className='moverlay';ov.id='pedit-ov';
  ov.onclick=e=>{if(e.target===ov)fecharEdicao();};
  ov.innerHTML=`<div class="modal"><div class="mt">Editar Perfil</div>
    <label>Nome</label><input class="inp" id="ep-nome" value="${p.nome}" style="margin-bottom:12px">
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Peso (kg)</label><input class="inp" id="ep-peso" type="number" inputmode="decimal" value="${p.peso}"></div>
      <div style="flex:1"><label>Altura (cm)</label><input class="inp" id="ep-alt" type="number" inputmode="decimal" value="${p.alt||170}"></div>
    </div>
    <div class="r2" style="margin-bottom:12px">
      <div style="flex:1"><label>Idade</label><input class="inp" id="ep-idade" type="number" inputmode="decimal" value="${p.idade}"></div>
      <div style="flex:1"><label>Sexo</label><select class="inp" id="ep-sexo"><option value="M" ${p.sexo==='M'?'selected':''}>Masculino</option><option value="F" ${p.sexo==='F'?'selected':''}>Feminino</option></select></div>
    </div>
    <label>Nível de atividade</label>
    <select class="inp" id="ep-atv" style="margin-bottom:12px">
      <option value="1.2" ${(p.atv||1.2)==1.2?'selected':''}>Sedentário</option>
      <option value="1.375" ${p.atv==1.375?'selected':''}>Leve (1-3x/semana)</option>
      <option value="1.55" ${p.atv==1.55?'selected':''}>Moderado (3-5x/semana)</option>
      <option value="1.725" ${p.atv==1.725?'selected':''}>Intenso (6-7x/semana)</option>
    </select>
    <label>Meta calórica (0 = calcular auto)</label>
    <input class="inp" id="ep-meta" type="number" inputmode="decimal" value="${p.meta}" style="margin-bottom:12px">
    <label>Meta de água (ml/dia)</label>
    <input class="inp" id="ep-agua" type="number" inputmode="decimal" value="${p.metaAgua||2000}" style="margin-bottom:16px">
    <button class="bta" onclick="salvarPerfil()">Salvar</button>
    <button onclick="fecharEdicao()" style="background:none;border:none;color:var(--text3);font-size:14px;width:100%;padding:12px;cursor:pointer;margin-top:4px">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
};
window.fecharEdicao=()=>{const o=document.getElementById('pedit-ov');if(o)o.remove();};
window.salvarPerfil=async()=>{
  const nome=document.getElementById('ep-nome').value.trim();
  const peso=parseFloat(document.getElementById('ep-peso').value);
  const alt=parseFloat(document.getElementById('ep-alt').value);
  const idade=parseInt(document.getElementById('ep-idade').value);
  const sexo=document.getElementById('ep-sexo').value;
  const atv=parseFloat(document.getElementById('ep-atv').value);
  const metaInput=parseInt(document.getElementById('ep-meta').value);
  const metaAgua=parseInt(document.getElementById('ep-agua').value)||2000;
  if(!nome||!peso||!alt||!idade){toast('Preencha todos os campos');return;}
  const novo={...perfil,nome,peso,alt,idade,sexo,atv,metaAgua};
  novo.tmb=calcTMB(novo);
  novo.meta=metaInput&&metaInput>0?metaInput:Math.max(Math.round(novo.tmb-500),1200);
  novo.ini=nome.substring(0,2).toUpperCase();
  perfil=novo;fecharEdicao();updHeader();
  await savePerfilCloud(currentUser.uid,perfil);
  toast('✓ Perfil atualizado!');render();
};

document.getElementById('hdate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
</script>
</body>
</html>
